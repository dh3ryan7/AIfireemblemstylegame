<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>TacticsForge — A Tactical RPG</title>
<style>
  :root{
    --bg:#0c1018; --panel:#161d2b; --panel2:#1f2942; --ink:#e8eef7; --dim:#9aa7bd;
    --gold:#f2c14e; --blue:#4ea0ff; --teal:#39c5bb; --red:#ff5d54; --orange:#ff9d3b;
    --green:#5fd86a; --purple:#b07cff; --good:#7ee081; --bad:#ff6b6b;
    --line:#2c3a55;
  }
  *{box-sizing:border-box; -webkit-user-select:none; user-select:none;}
  html,body{margin:0;height:100%;background:#05070c;overflow:hidden;
    font-family:"Segoe UI",system-ui,Roboto,Arial,sans-serif;color:var(--ink);}
  #fit{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:
    radial-gradient(1200px 700px at 50% -10%, #14203a 0%, #070b13 60%, #04060b 100%);}
  #stage{position:relative;width:960px;height:600px;transform-origin:center center;
    background:var(--bg);border:1px solid #0a0e16;box-shadow:0 18px 60px rgba(0,0,0,.6);
    border-radius:8px;overflow:hidden;}
  canvas{display:block;image-rendering:auto;}
  .hidden{display:none !important;}


  /* ---- Battle HUD ---- */
  #topbar{position:absolute;top:0;left:0;right:0;height:34px;display:flex;align-items:center;
    gap:14px;padding:0 12px;background:linear-gradient(#121a2b,#0e1422);
    border-bottom:1px solid var(--line);font-size:13px;z-index:20;}
  #topbar .phase{font-weight:700;letter-spacing:.4px;padding:2px 10px;border-radius:11px;}
  #topbar .obj{color:var(--dim);} #topbar .obj b{color:var(--ink);}
  #topbar .spacer{flex:1;}
  #topbar .gold,#wDiff{color:var(--gold);font-weight:700;}

  .panel{position:absolute;background:rgba(18,24,38,.96);border:1px solid var(--line);
    border-radius:8px;box-shadow:0 8px 26px rgba(0,0,0,.5);z-index:30;}
  /* Unit info card */
  #infocard{left:10px;bottom:10px;width:258px;padding:11px 12px;font-size:12px;z-index:25;pointer-events:none;}
  #infocard .ic-top{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
  #infocard .ic-port{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:0 0 auto;border:2px solid;}
  #infocard .ic-meta{flex:1;min-width:0;}
  #infocard .nm{font-size:15px;font-weight:800;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #infocard .cls{color:var(--dim);font-size:11px;}
  #infocard .ic-hp{text-align:right;font-weight:800;font-size:17px;flex:0 0 auto;line-height:1;}
  #infocard .ic-hp span{color:var(--dim);font-size:11px;font-weight:600;}
  #infocard .hpbar{height:7px;border-radius:4px;background:#2a3550;overflow:hidden;margin:0 0 9px;}
  #infocard .hpfill{height:100%;transition:width .15s;}
  #infocard .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
  #infocard .st{display:flex;flex-direction:column;align-items:center;background:#1b2438;border-radius:5px;padding:3px 0 4px;}
  #infocard .st i{color:var(--dim);font-size:9px;font-style:normal;letter-spacing:.5px;}
  #infocard .st b{color:var(--ink);font-size:14px;font-weight:700;}
  #infocard .wpn{margin-top:8px;color:var(--gold);font-size:12px;display:flex;align-items:center;gap:6px;}
  #infocard .wdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  #infocard .skills{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;}
  #infocard .terr{margin-top:7px;color:var(--teal);font-size:11px;border-top:1px solid var(--line);padding-top:6px;}

  /* Action menu */
  #menu{min-width:156px;padding:6px;z-index:40;}
  #menu .item{padding:9px 14px;border-radius:6px;font-size:14px;cursor:pointer;display:flex;
    justify-content:space-between;gap:14px;}
  #menu .item:hover,#menu .item.sel{background:var(--panel2);}
  #menu .item.dis{color:#5b6783;pointer-events:none;}
  #menu .item .k{color:var(--dim);font-size:11px;}

  /* Forecast */
  #forecast{width:300px;padding:0;overflow:hidden;z-index:40;}
  #forecast .fc-h{display:flex;justify-content:space-between;padding:7px 10px;font-size:12px;
    background:var(--panel2);border-bottom:1px solid var(--line);}
  #forecast .fc-body{display:flex;}
  #forecast .fc-col{flex:1;padding:8px 10px;font-size:12px;}
  #forecast .fc-col:first-child{border-right:1px solid var(--line);}
  #forecast .fc-nm{font-weight:700;font-size:13px;margin-bottom:5px;}
  #forecast .fc-row{display:flex;justify-content:space-between;color:var(--dim);margin:2px 0;}
  #forecast .fc-row b{color:var(--ink);}
  #forecast .fc-row .x2{color:var(--orange);font-weight:700;}
  #forecast .hpprev{height:7px;border-radius:4px;background:#2a3550;overflow:hidden;margin:5px 0 2px;}
  #forecast .hpprev .cur{height:100%;float:left;background:#54e07a;}
  #forecast .hpprev .dmg{height:100%;float:left;background:#ff6b6b;}


  /* Generic list panel (items/trade/target select handled inline) */
  #listpanel{min-width:180px;padding:5px;z-index:41;max-height:280px;overflow:auto;}
  #listpanel .ttl{font-size:11px;color:var(--dim);padding:3px 8px;text-transform:uppercase;letter-spacing:.5px;}
  #listpanel .item{padding:8px 11px;border-radius:5px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;gap:12px;}
  #listpanel .item:hover,#listpanel .item.sel{background:var(--panel2);}
  #listpanel .item .sub{color:var(--dim);font-size:11px;}
  #listpanel .item.dis{color:#5b6783;}

  /* Dialogue */
  #dlg{position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;justify-content:flex-end;}
  #dlg .scrim{position:absolute;inset:0;background:linear-gradient(transparent 40%, rgba(4,7,13,.75));}
  #dlg .ports{position:absolute;inset:0;}
  #dlg .port{position:absolute;bottom:150px;width:150px;height:185px;transition:all .25s ease;filter:saturate(1);}
  #dlg .port.left{left:40px;} #dlg .port.right{right:40px;transform:scaleX(-1);}
  #dlg .port.dim{filter:brightness(.45) saturate(.6);}
  #dlg .box{position:relative;margin:0 26px 22px;background:rgba(14,20,34,.97);
    border:1px solid var(--line);border-radius:10px;padding:14px 18px 16px;min-height:104px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);}
  #dlg .who{font-weight:800;color:var(--gold);font-size:15px;margin-bottom:6px;letter-spacing:.3px;}
  #dlg .txt{font-size:15px;line-height:1.5;color:var(--ink);min-height:44px;}
  #dlg .adv{position:absolute;right:14px;bottom:10px;color:var(--dim);font-size:11px;animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.25;}}

  /* Title */
  #title{position:absolute;inset:0;z-index:70;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;background:radial-gradient(900px 500px at 50% 30%, #16233f, #070b13 70%);}
  #title h1{font-size:64px;margin:0;letter-spacing:3px;font-weight:900;
    background:linear-gradient(#ffe49a,#f2c14e 55%,#b9831f);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 4px 24px rgba(242,193,78,.25);}
  #title .sub{color:var(--dim);margin:6px 0 26px;letter-spacing:6px;font-size:13px;text-transform:uppercase;}
  #title .menu{display:flex;flex-direction:column;gap:8px;width:260px;}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:11px 16px;
    border-radius:8px;font-size:14px;cursor:pointer;transition:.12s;font-weight:600;letter-spacing:.3px;}
  .btn:hover{background:#2a385c;border-color:#46608f;}
  .btn.sel{background:#2a385c;border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
  .btn.gold{background:linear-gradient(#f2c14e,#d49a23);color:#241a06;border-color:#caa137;}
  .btn.sm{padding:7px 12px;font-size:12px;}
  #title .foot{position:absolute;bottom:14px;color:#55617d;font-size:11px;}

  /* World map / chapter select */
  #world{position:absolute;inset:0;z-index:55;background:
    radial-gradient(800px 500px at 70% 20%, #1a2742, #0a0f1a 70%);display:none;flex-direction:column;}
  #world .wtop{padding:14px 18px;font-size:13px;color:var(--dim);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);}
  #world .wtop b{color:var(--gold);font-size:16px;}
  #world .wbody{flex:1;display:flex;min-height:0;}
  #world .nodes{flex:1;position:relative;}
  #world .node{position:absolute;width:120px;transform:translate(-50%,-50%);text-align:center;cursor:pointer;}
  #world .node .dot{width:26px;height:26px;border-radius:50%;margin:0 auto 5px;border:2px solid var(--line);
    background:#202c47;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
  #world .node.done .dot{background:var(--teal);border-color:#8ff;color:#04221f;}
  #world .node.cur .dot{background:var(--gold);border-color:#ffe9a8;color:#3a2a05;box-shadow:0 0 0 4px rgba(242,193,78,.22);}
  #world .node.lock{opacity:.4;cursor:default;}
  #world .node .lbl{font-size:11px;color:var(--ink);} #world .node .obj{font-size:10px;color:var(--dim);}
  #world .side{width:280px;border-left:1px solid var(--line);background:rgba(12,17,28,.6);padding:16px;overflow:auto;}
  #world .side h3{margin:0 0 4px;color:var(--gold);}
  #world .side .o{font-size:12px;color:var(--dim);margin-bottom:10px;}
  #world .side p{font-size:12px;line-height:1.5;color:#c3cde0;}
  #world .roster{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  #world .roster .u{width:38px;text-align:center;font-size:9px;color:var(--dim);}
  #world .wbtns{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;}

  /* Generic modal (results, prep, level-up, help, pause) */
  #modal{position:absolute;inset:0;z-index:80;display:none;align-items:center;justify-content:center;
    background:rgba(4,7,13,.6);}
  #modal .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    width:560px;max-width:88%;max-height:86%;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #modal .card h2{margin:0;padding:14px 18px;border-bottom:1px solid var(--line);font-size:18px;color:var(--gold);}
  #modal .card .bd{padding:16px 18px;font-size:13px;line-height:1.55;}
  #modal .card .ft{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;}
  table.kv{width:100%;border-collapse:collapse;font-size:12px;}
  table.kv td{padding:3px 6px;border-bottom:1px solid #20293f;} table.kv td:last-child{text-align:right;color:var(--ink);}
  table.kv td:first-child{color:var(--dim);}

  /* Toast / banner */
  #toast{position:absolute;top:44px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;}
  #toast .t{background:rgba(20,28,46,.95);border:1px solid var(--line);padding:7px 16px;border-radius:20px;font-size:13px;
    animation:toastIn .3s ease;} .t.warn{border-color:var(--orange);color:#ffd9a8;} .t.good{border-color:var(--green);}
  @keyframes toastIn{from{opacity:0;transform:translateY(-8px);}}
  #banner{position:absolute;top:0;left:0;right:0;bottom:0;z-index:85;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  #banner .b{font-size:40px;font-weight:900;letter-spacing:6px;padding:10px 40px;opacity:0;
    text-shadow:0 4px 20px rgba(0,0,0,.6);}
  .anim-banner{animation:bannerPop 1.4s ease forwards;}
  @keyframes bannerPop{0%{opacity:0;transform:scale(1.3);}15%{opacity:1;transform:scale(1);}80%{opacity:1;}100%{opacity:0;}}

  .sk{font-size:10px;background:#2a2150;border:1px solid #4a3a8a;color:#cdb8ff;border-radius:4px;padding:1px 5px;margin-left:4px;}
  .badge{font-size:9px;font-weight:800;border-radius:3px;padding:0 4px;}
  ::-webkit-scrollbar{width:9px;height:9px;}::-webkit-scrollbar-thumb{background:#2c3a55;border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  #help kbd{background:#222c44;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:1px 6px;font-size:11px;}
  #topbar .hudbtn{background:#223150;border:1px solid #3a4f78;color:#dce6f5;font-size:12px;font-weight:600;padding:0 11px;height:24px;border-radius:6px;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;}
  #topbar .hudbtn:hover{background:#2e436b;border-color:#4d6699;}
  #topbar .hudbtn.primary{background:linear-gradient(#f2c14e,#d49a23);color:#241a06;border-color:#caa137;font-weight:700;}
  #topbar .hudbtn.primary:hover{filter:brightness(1.08);}
  #topbar .hudbtn.off{opacity:.38;pointer-events:none;}
  #forecast .fc-act{display:flex;gap:8px;padding:8px 10px;border-top:1px solid var(--line);}
  #forecast .fc-act .btn{flex:1;justify-content:center;text-align:center;}
  #forecast .hover-hint{padding:6px 10px;font-size:11px;color:var(--dim);border-top:1px solid var(--line);text-align:center;}
  #roster{position:absolute;right:6px;top:40px;display:flex;flex-direction:column;gap:5px;z-index:24;max-height:548px;overflow:hidden;}
  #roster .rchip{display:flex;align-items:center;gap:7px;width:140px;padding:4px 7px;background:rgba(14,20,34,.9);border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:.1s;}
  #roster .rchip:hover{border-color:#4d6699;background:rgba(26,36,58,.96);}
  #roster .rchip.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
  #roster .rchip.acted{opacity:.45;}
  #roster .rg{width:27px;height:27px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid;flex:0 0 auto;}
  #roster .rmeta{flex:1;min-width:0;}
  #roster .rname{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#dce6f5;}
  #roster .rhp{height:5px;border-radius:3px;background:#2a3550;overflow:hidden;margin-top:3px;}
  #roster .rhp .f{height:100%;}

  /* ---- Stat screens (class compendium & unit inspect) — all classes cx- prefixed ---- */
  #modal .card.cx-wide{width:820px;}
  .cx-wrap{display:flex;gap:14px;min-height:0;}
  .cx-list{flex:0 0 206px;max-height:378px;overflow:auto;padding-right:4px;}
  .cx-grp{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;padding:7px 8px 3px;}
  .cx-row{display:flex;align-items:center;gap:8px;padding:6px 9px;border:1px solid transparent;border-radius:7px;cursor:pointer;font-size:13px;margin-bottom:2px;}
  .cx-row:hover{background:var(--panel2);}
  .cx-row.sel{background:var(--panel2);border-color:#46608f;}
  .cx-row.cx-on{background:rgba(78,160,255,.12);border-color:#3f7be0;}
  .cx-row .cx-g{width:22px;text-align:center;font-size:14px;flex:0 0 auto;}
  .cx-row b{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cx-row .cx-t{font-size:8px;color:var(--dim);letter-spacing:.4px;}
  .cx-detail{flex:1;min-width:0;max-height:378px;overflow:auto;padding-right:4px;}
  .cx-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .cx-port{width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:23px;border:2px solid var(--line);background:var(--panel2);flex:0 0 auto;}
  .cx-nm{font-size:17px;font-weight:800;letter-spacing:.2px;}
  .cx-sub{color:var(--dim);font-size:11px;margin-top:2px;}
  .cx-tag{display:inline-block;font-size:9px;font-weight:800;border-radius:3px;padding:1px 5px;margin-left:7px;vertical-align:2px;}
  .cx-tag.t1{background:#2f4a78;color:#9fd0ff;} .cx-tag.t2{background:#6b5322;color:#ffe49a;}
  .cx-bar{flex:1;height:9px;border-radius:5px;background:#141b2b;border:1px solid #232e48;overflow:hidden;min-width:36px;}
  .cx-bar i{display:block;height:100%;background:var(--blue);}
  .cx-srow{display:flex;align-items:center;gap:8px;padding:2px 0;font-size:12px;}
  .cx-srow .cx-k{flex:0 0 32px;color:var(--dim);font-size:10px;letter-spacing:.5px;}
  .cx-srow .cx-v{flex:0 0 24px;text-align:right;font-weight:700;}
  .cx-srow .cx-c{flex:0 0 26px;color:var(--dim);font-size:10px;}
  .cx-srow .cx-gr{flex:0 0 36px;text-align:right;color:var(--teal);font-size:11px;font-weight:600;}
  .cx-cols{display:flex;gap:16px;} .cx-cols>div{flex:1;min-width:0;}
  .cx-h{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin:10px 0 4px;border-bottom:1px solid var(--line);padding-bottom:3px;}
  .cx-h:first-child{margin-top:0;}
  .cx-irow{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid #20293f;font-size:12px;}
  .cx-irow.dis{opacity:.5;}
  .cx-use{color:var(--dim);font-size:11px;flex:0 0 auto;}
  .cx-eq{font-size:9px;font-weight:800;background:#6b5322;color:#ffe49a;border-radius:3px;padding:0 4px;flex:0 0 auto;}
  .cx-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .cx-note{color:var(--dim);font-size:10px;margin-top:6px;font-style:italic;}
  .cx-skrow{padding:4px 0 5px;border-bottom:1px solid #20293f;font-size:12px;}
  .cx-skrow .desc{color:var(--dim);font-size:11px;margin-top:2px;line-height:1.4;}
  .cx-jump{color:var(--blue);cursor:pointer;border-bottom:1px dotted var(--blue);}
  .cx-jump:hover{color:#9fd0ff;}
  .cx-hpnum{font-weight:800;font-size:16px;margin-left:auto;flex:0 0 auto;}
  .cx-hpnum span{color:var(--dim);font-size:11px;font-weight:600;}

  /* ---- Combat log ---- */
  #combatlog{position:absolute;left:10px;top:40px;width:290px;max-height:200px;overflow-y:auto;z-index:26;
    background:rgba(14,20,34,.93);border:1px solid var(--line);border-radius:8px;padding:6px 10px;
    font-size:11px;line-height:1.6;box-shadow:0 8px 26px rgba(0,0,0,.5);}
  #combatlog .cl-line{color:var(--dim);}
  #combatlog .cl-line b{color:var(--ink);}
  #combatlog .cl-turn{color:var(--gold);font-weight:700;letter-spacing:.4px;margin:4px 0 1px;border-bottom:1px solid var(--line);padding-bottom:2px;}

</style>
</head>
<body>
<div id="fit">
  <div id="stage">
    <canvas id="cv" width="960" height="600"></canvas>

    <!-- Battle HUD -->
    <div id="topbar" class="hidden">
      <span class="phase" id="phaseTag">PLAYER PHASE</span>
      <span class="obj" id="objText"></span>
      <span class="spacer"></span>
      <span class="obj">Turn <b id="turnNum">1</b></span>

      <button class="hudbtn" id="btnLog" title="Toggle combat log (L)">≡ Log</button>
      <button class="hudbtn" id="btnDanger" title="Toggle enemy danger zone (D)">⚠ Danger</button>
      <button class="hudbtn" id="btnMenu" title="Open menu">☰ Menu</button>
      <button class="hudbtn primary" id="btnEnd" title="End turn (E)">End Turn ▸</button>
    </div>

    <div id="infocard" class="panel hidden"></div>
    <div id="roster"></div>
    <div id="menu" class="panel hidden"></div>
    <div id="forecast" class="panel hidden"></div>
    <div id="listpanel" class="panel hidden"></div>

    <!-- Scenes / overlays -->
    <div id="dlg" class="hidden">
      <div class="scrim"></div><div class="ports" id="dlgPorts"></div>
      <div class="box"><div class="who" id="dlgWho"></div><div class="txt" id="dlgTxt"></div>
        <div class="adv">▼ space</div></div>
    </div>

    <div id="world">
      <div class="wtop"><b id="wTitle">The March</b><span id="wChap"></span><span class="spacer" style="flex:1"></span>
        <span id="wDiff" class="gold"></span></div>
      <div class="wbody"><div class="nodes" id="wNodes"></div>
        <div class="side" id="wSide"></div></div>
      <div class="wbtns" id="wBtns"></div>
    </div>

    <div id="title">
      <h1>TACTICS<span style="color:#39c5bb">FORGE</span></h1>
      <div class="sub">Embers of Valden</div>
      <div class="menu" id="titleMenu"></div>
      <div class="foot">Mouse or keyboard · single offline file &nbsp;•&nbsp; <b style="color:#7fa8d8">build v1.9.2 — roster at Lv10 (promotion testing)</b></div>
    </div>

    <div id="modal"><div class="card"><h2 id="mTitle"></h2><div class="bd" id="mBody"></div>
      <div class="ft" id="mFoot"></div></div></div>

    <div id="combatlog" class="hidden"></div>
    <div id="toast"></div>
    <div id="banner"><div class="b" id="bannerTxt"></div></div>
  </div>
</div>

<script>
"use strict";

   TacticsForge — single-file tactical RPG.  Built in modules below.

/* Seedable PRNG (Mulberry32) — reproducible playtests. */
const RNG={
  s:0x9e3779b9>>>0,
  seed(n){this.s=(n>>>0)||1; return this;},
  next(){ let t=this.s+=0x6D2B79F5; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; },
  int(n){return Math.floor(this.next()*n);},               // 0..n-1
  range(a,b){return a+Math.floor(this.next()*(b-a+1));},    // inclusive
  d100(){return this.int(100);},                            // 0..99
  chance(p){return this.next()*100<p;},                     // p%
  pick(a){return a[this.int(a.length)];},
  shuffle(a){for(let i=a.length-1;i>0;i--){const j=this.int(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;},
};
/* 2RN hit: average of two rolls vs displayed rate — authentic FE feel. */
function hits(rate){ if(rate>=100)return true; if(rate<=0)return false; const avg=(RNG.d100()+RNG.d100())/2; return avg<rate; }

/* -------- Web Audio SFX (no asset files) -------- */
const SFX=(()=>{
  let ac=null, master=null, on=true;
  function ensure(){ if(ac)return; try{ ac=new (window.AudioContext||window.webkitAudioContext)(); master=ac.createGain(); master.gain.value=0.32; master.connect(ac.destination);}catch(e){on=false;} }
  function tone(freq,dur,type='square',vol=0.5,slideTo=null,delay=0){
    if(!on)return; ensure(); if(!ac)return;
    const t=ac.currentTime+delay; const o=ac.createOscillator(); const g=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    if(slideTo)o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),t+dur);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
  }
  function noise(dur,vol=0.4,filterFreq=1200,delay=0){
    if(!on)return; ensure(); if(!ac)return;
    const t=ac.currentTime+delay; const n=ac.createBufferSource();
    const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate); const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    n.buffer=buf; const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=filterFreq;
    const g=ac.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    n.connect(f); f.connect(g); g.connect(master); n.start(t); n.stop(t+dur);
  }
  return {
    setOn(v){on=v;}, isOn(){return on;}, resume(){ensure(); if(ac&&ac.state==='suspended')ac.resume();},
    cursor(){tone(420,0.04,'square',0.18);},
    select(){tone(620,0.06,'square',0.28); tone(820,0.06,'square',0.2,null,0.04);},
    back(){tone(300,0.07,'square',0.22,180);},
    move(){tone(360,0.05,'triangle',0.16);},
    hit(){noise(0.12,0.5,1600); tone(180,0.1,'square',0.25,90);},
    crit(){noise(0.22,0.6,2600); tone(150,0.18,'sawtooth',0.32,70); tone(440,0.18,'square',0.2,180,0.02);},
    miss(){tone(520,0.12,'sine',0.22,260);},
    heal(){tone(660,0.12,'sine',0.25); tone(880,0.14,'sine',0.22,null,0.08); tone(1100,0.16,'sine',0.18,null,0.16);},
    death(){tone(300,0.5,'sawtooth',0.32,60); noise(0.4,0.3,800,0.05);},
    levelup(){[523,659,784,1046].forEach((f,i)=>tone(f,0.16,'square',0.26,null,i*0.1));},
    promote(){[392,523,659,784,1046,1318].forEach((f,i)=>tone(f,0.2,'triangle',0.28,null,i*0.09));},
    victory(){[523,659,784,1046,784,1046,1318].forEach((f,i)=>tone(f,0.22,'square',0.26,null,i*0.13));},
    defeat(){[440,392,330,262].forEach((f,i)=>tone(f,0.45,'sawtooth',0.3,null,i*0.22));},
    seize(){[523,784,1046,1568].forEach((f,i)=>tone(f,0.2,'triangle',0.3,null,i*0.1));},
    phase(){tone(330,0.12,'sawtooth',0.22,440); tone(440,0.14,'sawtooth',0.2,560,0.07);},
    talk(){tone(700,0.05,'sine',0.16); tone(760,0.05,'sine',0.14,null,0.05);},
    whoosh(heavy){ noise(heavy?0.16:0.09, heavy?0.30:0.20, heavy?900:1700); tone(heavy?150:300,0.07,'sine',0.10,heavy?80:200); },
    bowDraw(){ tone(200,0.20,'sine',0.10,360); },
    bowRelease(){ noise(0.05,0.32,2800); tone(900,0.05,'square',0.16,420); },
    spellCharge(){ tone(280,0.30,'sine',0.12,720); },
    fireCast(){ noise(0.32,0.42,1300); tone(110,0.30,'sawtooth',0.26,55); },
    thunderCast(){ noise(0.16,0.5,4200); tone(220,0.12,'square',0.30,1100); tone(90,0.2,'sawtooth',0.24,50,0.02); },
    lightCast(){ [880,1240,1660].forEach((f,i)=>tone(f,0.20,'sine',0.20,null,i*0.05)); },
    darkCast(){ tone(150,0.34,'sawtooth',0.28,66); noise(0.30,0.24,520,0.04); },
    boss(){ tone(70,0.6,'sawtooth',0.32,55); tone(110,0.55,'square',0.22,90,0.04); tone(146,0.5,'sawtooth',0.18,120,0.10); },
    critWarn(){ tone(392,0.10,'sawtooth',0.30,660); tone(523,0.15,'sawtooth',0.26,1046,0.07); noise(0.08,0.25,3200,0.05); },
    error(){tone(160,0.16,'square',0.3,120);},
  };
})();

/* Weapon / magic triangle. Returns {mt, hit} bonus for attacker vs defender weapon types. */
const PHYS_TRI={sword:'axe',axe:'lance',lance:'sword'};   // key beats value
const MAG_TRI ={anima:'light',light:'dark',dark:'anima'};
function triangle(aType,dType){
  if(!aType||!dType) return {mt:0,hit:0};
  if(PHYS_TRI[aType]===dType||MAG_TRI[aType]===dType) return {mt:1,hit:15};
  if(PHYS_TRI[dType]===aType||MAG_TRI[dType]===aType) return {mt:-1,hit:-15};
  return {mt:0,hit:0};
}

/* Build a scaled stat line for a generic unit of the class & level. */
function genStatLine(cls,level){
  const b=classBase(cls), g=classGrow(cls), o={};

function makeUnit(tpl,faction){

    items:(tpl.items||[]).map(id=> WEAPONS[id]?mkWeapon(id):mkItem(id)).filter(Boolean),
    equipIdx:0, movBonus:tpl.movBonus||0,
    wexp:{}, skills:[...(tpl.skills||[]), ...(classOf(cls).innate||[])],

  u.items.forEach(it=>{ const w=WEAPONS[it.id]; if(w && classOf(cls).weapons.includes(w.type)){ const need=RANK_EXP[w.rank]+1; if((u.wexp[w.type]||0)<need) u.wexp[w.type]=need; } });

}

/* ---- derived stats ---- */
function statCapOf(u,key){ const c=classOf(u.cls).caps; return key==='hp'?c.hp:(c[key]??30); }
function getStat(u,key){
  if(key==='mov') return clamp(classOf(u.cls).mov + (u.movBonus||0), 1, 12);
  if(key==='con') return u.base.con||8;
  let v=u.base[key]||0;
  if(u.statuses && u.statuses[key]) v+=u.statuses[key];
  return clamp(v,0,statCapOf(u,key));
}
const mov=u=>getStat(u,'mov');

function isWeaponItem(it){ return it && WEAPONS[it.id]; }
function isStaff(it){ return it && WEAPONS[it.id] && WEAPONS[it.id].staff; }
function rankOf(u,type){ return rankFromExp(u.wexp[type]||0); }
function canUse(u,it){
  if(!isWeaponItem(it)) return false;
  const w=WEAPONS[it.id], cl=classOf(u.cls);
  if(!cl.weapons.includes(w.type)) return false;
  if(it.personal && it.owner && it.owner!==u.uid) return false;
  return RANK_ORDER[rankOf(u,w.type)]>=RANK_ORDER[w.rank];
}
function attackWeapons(u){ return u.items.filter(it=>isWeaponItem(it)&&!isStaff(it)&&canUse(u,it)&&it.uses>0); }
function staffItems(u){ return u.items.filter(it=>isStaff(it)&&canUse(u,it)&&it.uses>0); }
function equippedWeapon(u){
  const it=u.items[u.equipIdx];
  if(it&&isWeaponItem(it)&&!isStaff(it)&&canUse(u,it)&&it.uses>0) return it;
  return attackWeapons(u)[0]||null;
}
function equipBest(u){
  const ws=attackWeapons(u);
  if(!ws.length){ return; }
  let best=ws[0], bi=u.items.indexOf(best);
  ws.forEach(w=>{ if(WEAPONS[w.id].mt> WEAPONS[best.id].mt){ best=w; bi=u.items.indexOf(w);} });
  u.equipIdx=bi;
}
function equipItem(u,it){ const i=u.items.indexOf(it); if(i>=0&&canUse(u,it)) u.equipIdx=i; }


/* atk speed, avoid */
function atkSpd(u,wpn){
  const w=wpn||equippedWeapon(u); const wt=w?WEAPONS[w.id].wt:0;
  return getStat(u,'spd') - Math.max(0, wt - getStat(u,'con'));
}
function classAvo(u){ return classOf(u.cls).avo||0; }
function classCrit(u){ return classOf(u.cls).crit||0; }
function hasSkill(u,id){ return u.skills && u.skills.includes(id); }

/* ---- EXP / level-up / promotion ---- */

function grantExp(u,amount){
  if(u.faction!=='player') return null;

  if(u.level>=20 && classOf(u.cls).tier===2) return null;
  u.exp+=Math.max(1,Math.round(amount));
  let leveled=null;
  while(u.exp>=100 && !(u.level>=20)){
    u.exp-=100; leveled=levelUp(u);
  }
  if(u.level>=20) u.exp=0;
  return leveled;
}
function levelUp(u){
  u.level++;

  STATS.forEach(s=>{
    const cur=u.base[s]||0, capV=s==='hp'?statCapOf(u,'hp'):statCapOf(u,s);
    if(cur<capV && RNG.chance(g[s]||0)){ u.base[s]=cur+1; gains[s]=1; }
  });

  return gains;
}
function canPromote(u){

}
function promoOptionsOf(u){ const cl=classOf(u.cls); return cl.promos ? cl.promos.slice() : (cl.promo?[cl.promo]:[]); }
function promote(u,targetId){

    let inc=pb[s];

    if((promoBase[s]||0) - (u.base[s]||0) > inc+2) inc+=1;
    u.base[s]=clamp((u.base[s]||0)+inc,0,nc.caps[s==='hp'?'hp':s]??30);
  });

let B=null;   // live battle state (set by battle controller); combat reads terrain/support from it.
function mapChar(x,y){ if(!B||!B.map) return '.'; if(y<0||x<0||y>=B.h||x>=B.w) return '#'; return B.map[y][x]; }
function unitAt(x,y){ if(!B) return null; return B.units.find(u=>u.hp>0&&u.x===x&&u.y===y)||null; }
const dist=(a,b)=>Math.abs(a.x-b.x)+Math.abs(a.y-b.y);

const SUPPORT_BONUS={1:{hit:5,avo:5,crit:0,dmg:0,ddg:0},2:{hit:10,avo:10,crit:3,dmg:1,ddg:1},3:{hit:15,avo:15,crit:7,dmg:2,ddg:2}};
function supportAura(u){
  const out={hit:0,avo:0,crit:0,dmg:0,ddg:0};
  if(!B) return out;
  if(u.supports) for(const s of u.supports){
    const p=B.units.find(x=>x.uid===s.with && x.hp>0 && x.faction===u.faction);
    if(p && Math.max(Math.abs(p.x-u.x),Math.abs(p.y-u.y))<=2){
      const b=SUPPORT_BONUS[s.rank||1]; if(b){out.hit+=b.hit;out.avo+=b.avo;out.crit+=b.crit;out.dmg+=b.dmg;out.ddg+=b.ddg;}
    }
  }
  for(const a of B.units){ if(a.uid!==u.uid&&a.faction===u.faction&&a.hp>0&&hasSkill(a,'charm')
      && Math.max(Math.abs(a.x-u.x),Math.abs(a.y-u.y))<=2){ out.hit+=10; out.avo+=10; } }
  return out;
}
function isEffective(wid,target){
  const w=WEAPONS[wid]; if(!w) return false;
  if(w.type==='bow' && classOf(target.cls).move==='fly') return true;
  if(w.eff){ const tags=classOf(target.cls).tags||[]; return w.eff.some(t=>tags.includes(t)); }
  return false;
}
function canHitAtRange(u,d){ const w=equippedWeapon(u); if(!w||w.uses<=0) return false; const r=WEAPONS[w.id].range; return d>=r[0]&&d<=r[1]; }

function rawDamage(src,tgt,opt){
  const aw=equippedWeapon(src); if(!aw) return 0; const w=WEAPONS[aw.id];
  const dw=equippedWeapon(tgt);
  const tri=triangle(w.type, dw?WEAPONS[dw.id].type:null);
  const eff=isEffective(aw.id,tgt), mag=isMagic(w.type);
  const sup=supportAura(src);
  const atkStat=(mag?getStat(src,'mag'):getStat(src,'str')) + w.mt*(eff?3:1) + tri.mt + sup.dmg;
  let defBase=(mag?getStat(tgt,'res'):getStat(tgt,'def'));
  if(opt&&opt.luna) defBase=Math.floor(defBase/2);
  const defStat=defBase + terrainAt(mapChar(tgt.x,tgt.y)).def + supportAura(tgt).ddg;
  return Math.max(0, atkStat-defStat);
}
/* Full combat profile of src attacking tgt (assumes within range). */
function profile(src,tgt){
  const aw=equippedWeapon(src); if(!aw) return null; const w=WEAPONS[aw.id];
  const dw=equippedWeapon(tgt);
  const tri=triangle(w.type, dw?WEAPONS[dw.id].type:null);
  const eff=isEffective(aw.id,tgt), mag=isMagic(w.type);
  const sup=supportAura(src), dsup=supportAura(tgt);
  const dmg=rawDamage(src,tgt);
  const ter=terrainAt(mapChar(tgt.x,tgt.y));
  const hit=clamp(w.hit + getStat(src,'skl')*2 + Math.floor(getStat(src,'lck')/2) + tri.hit + sup.hit
            - (atkSpd(tgt)*2 + getStat(tgt,'lck') + ter.avo + classAvo(tgt) + dsup.avo), 0, 100);
  let crit=w.crit + Math.floor(getStat(src,'skl')/2) + classCrit(src) + sup.crit
           + (hasSkill(src,'wrath') && src.hp*2<src.maxhp ? 20:0)
           - (getStat(tgt,'lck') + dsup.crit);
  crit=clamp(crit,0,100);
  const as=atkSpd(src)-atkSpd(tgt), doubles = as>=4 || (hasSkill(src,'pursuit') && as>=1);
  return {dmg,hit,crit,doubles,eff,mag,tri:tri.mt,wtype:w.type,range:w.range};

/* Forecast for the UI panel — both directions + doubling. */
function forecast(att,def,d){
  d=d==null?dist(att,def):d;
  const a=profile(att,def);
  const counter=(canHitAtRange(def,d)&&def.hp>0)?profile(def,att):null;
  return {a, counter, dist:d, att, def};
}

function gainWexp(u,type){ u.wexp[type]=(u.wexp[type]||0)+(hasSkill(u,'discipline')?2:1); }
function oneHit(src,tgt,log){
  const aw=equippedWeapon(src); if(!aw){ return null; } const w=WEAPONS[aw.id];
  const p=profile(src,tgt);
  gainWexp(src,w.type); if(aw.uses!==undefined) aw.uses=Math.max(0,aw.uses-1);
  const ev={attacker:src,defender:tgt,hit:false,crit:false,dmg:0,killed:false,procs:[],heal:0,wtype:w.type,wid:aw.id,eff:p.eff};
  let luna=false;
  if(hasSkill(src,'luna') && RNG.chance(getStat(src,'skl'))){ luna=true; ev.procs.push('Luna'); }
  if(!hits(p.hit)){ ev.miss=true; log.push(ev); return ev; }
  ev.hit=true;
  let dmg=rawDamage(src,tgt,{luna});
  if(RNG.d100()<p.crit){ ev.crit=true; dmg*=3; }
  if(hasSkill(tgt,'pavise') && RNG.chance(getStat(tgt,'skl'))){ dmg=Math.floor(dmg/2); ev.procs.push('Pavise'); }
  if(hasSkill(src,'silencer') && !tgt.isBoss && RNG.chance(getStat(src,'skl')/2)){ dmg=tgt.hp; ev.crit=true; ev.procs.push('Lethality'); }
  ev.dmg=dmg; tgt.hp=clamp(tgt.hp-dmg,0,tgt.maxhp);
  if(hasSkill(src,'sol') && dmg>0 && RNG.chance(getStat(src,'skl'))){ const h=Math.floor(dmg/2); src.hp=clamp(src.hp+h,0,src.maxhp); ev.heal=h; ev.procs.push('Sol'); }
  if(tgt.hp<=0) ev.killed=true;
  log.push(ev); return ev;
}
function strikeWithAdept(src,tgt,log){
  oneHit(src,tgt,log);
  if(tgt.hp>0 && src.hp>0 && hasSkill(src,'adept') && RNG.chance(getStat(src,'skl'))){
    const e=oneHit(src,tgt,log); if(e) e.procs.push('Adept');
  }
}
function resolveCombat(att,def,d){
  d=d==null?dist(att,def):d;
  const log=[]; const a0=att.hp,d0=def.hp;
  const defCounters=canHitAtRange(def,d);
  const pA=profile(att,def), pD=defCounters?profile(def,att):null;
  const vantage=defCounters && hasSkill(def,'vantage') && def.hp*2<def.maxhp;
  const seq=[];
  if(defCounters && vantage) seq.push('D');
  seq.push('A');
  if(defCounters && !vantage) seq.push('D');
  if(pA.doubles) seq.push('A');
  if(defCounters && pD && pD.doubles) seq.push('D');
  for(const s of seq){
    if(s==='A'){ if(att.hp>0 && def.hp>0) strikeWithAdept(att,def,log); }
    else { if(def.hp>0 && att.hp>0) strikeWithAdept(def,att,log); }
  }
  // weapon may have broken
  if(equippedWeapon(att)==null) equipBest(att);
  if(def.hp>0 && equippedWeapon(def)==null) equipBest(def);
  // experience
  const exp=[];
  const ea=combatExp(att,def,log,true); if(ea) exp.push({unit:att,amount:ea});
  if(def.hp>0){ const ed=combatExp(def,att,log,false); if(ed) exp.push({unit:def,amount:ed}); }
  return {log, exp, dealtToDef:d0-def.hp, dealtToAtt:a0-att.hp};
}
function combatExp(u,foe,log,asAttacker){
  if(u.faction!=='player') return 0;
  const dealt=log.some(e=>e.attacker===u && e.hit && e.dmg>0);
  const fought=log.some(e=>e.attacker===u || e.defender===u);
  if(!fought) return 0;
  const foeKilled = foe.hp<=0;
  const tierVal=cl=>classOf(cl).tier===2?20:0;
  const lvlDiff=(foe.level+tierVal(foe.cls)) - (u.level+tierVal(u.cls));
  let exp;
  if(foeKilled && dealt){ exp = 20 + Math.max(0,lvlDiff) + (foe.isBoss?44:10); }
  else if(dealt){ exp = clamp(11 + lvlDiff, 1, 33); }
  else { exp = fought?1:0; }
  if(classOf(u.cls).tier===2 && classOf(foe.cls).tier===1 && !foe.isBoss) exp=Math.ceil(exp/2);
  return clamp(Math.round(exp),0,100);
}
/* Healing (staff) — returns {healed, exp}. */
function doHeal(healer,target,staffItem){
  const w=WEAPONS[staffItem.id];
  const amt=(w.healBase||10)+Math.floor(getStat(healer,'mag')/2);
  const before=target.hp; target.hp=clamp(target.hp+amt,0,target.maxhp);
  const healed=target.hp-before;
  if(staffItem.uses!==undefined) staffItem.uses=Math.max(0,staffItem.uses-1);
  gainWexp(healer,'staff');
  let exp=0;
  if(healer.faction==='player'){ exp=clamp(Math.round(healed*0.7+12),5,40); }
  return {healed,exp};
}
/* ============================ SECTION 5 — PATHFINDING & RANGE ========================== */
function hostile(a,b){ return (a==='enemy') !== (b==='enemy'); }   // enemy vs {player,green}
function moveCostEnter(u,x,y){
  const t=terrainAt(mapChar(x,y));
  if(t.wall) return INF;
  if(moveCat(u)==='fly') return 1;
  const c=t.c[moveCat(u)]; return c==null?1:c;
}
function blocksMove(u,x,y){ const o=unitAt(x,y); return !!o && o.uid!==u.uid && hostile(u.faction,o.faction); }
function inBounds(x,y){ return x>=0&&y>=0&&x<B.w&&y<B.h; }

function reachable(u){
  const budget=mov(u), start=key(u.x,u.y);
  const cost={[start]:0}, prev={};
  const pq=[[0,u.x,u.y]];
  while(pq.length){
    let bi=0; for(let i=1;i<pq.length;i++) if(pq[i][0]<pq[bi][0]) bi=i;
    const [c,x,y]=pq.splice(bi,1)[0];
    if(c>(cost[key(x,y)]??INF)) continue;
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=x+dx, ny=y+dy; if(!inBounds(nx,ny)) continue;
      if(blocksMove(u,nx,ny)) continue;
      const step=moveCostEnter(u,nx,ny); if(step===INF) continue;
      const nc=c+step; if(nc>budget) continue;
      const k=key(nx,ny);
      if(nc<(cost[k]??INF)){ cost[k]=nc; prev[k]=key(x,y); pq.push([nc,nx,ny]); }
    }
  }
  return {cost,prev,start,budget};
}
function standableTiles(u,reach){
  const out=[];
  for(const k in reach.cost){ const [x,y]=k.split(',').map(Number);
    const o=unitAt(x,y); if(!o||o.uid===u.uid) out.push({x,y,cost:reach.cost[k]}); }
  return out;
}
function pathTo(reach,tx,ty){
  let k=key(tx,ty); if(reach.cost[k]==null) return null;
  const path=[];
  while(true){ const [x,y]=k.split(',').map(Number); path.unshift({x,y}); if(k===reach.start) break; k=reach.prev[k]; if(!k) break; }
  return path;
}
function ringTiles(x,y,min,max){
  const out=[];
  for(let dx=-max;dx<=max;dx++) for(let dy=-max;dy<=max;dy++){
    const d=Math.abs(dx)+Math.abs(dy); if(d>=min&&d<=max){ const nx=x+dx,ny=y+dy; if(inBounds(nx,ny)) out.push([nx,ny]); }
  }
  return out;
}
/* All attack-threatened tiles (red overlay): from every standable tile, every weapon's ring. */
function threatTiles(u,reach){
  const set=new Set();
  const ws=attackWeapons(u); if(!ws.length) return set;
  let mn=99,mx=0; ws.forEach(w=>{const r=WEAPONS[w.id].range; mn=Math.min(mn,r[0]); mx=Math.max(mx,r[1]);});
  for(const s of standableTiles(u,reach)) for(const [x,y] of ringTiles(s.x,s.y,mn,mx)) set.add(key(x,y));
  return set;
}
function staffTiles(u,reach){
  const set=new Set(); const ss=staffItems(u); if(!ss.length) return set;
  let mn=99,mx=0; ss.forEach(w=>{const r=WEAPONS[w.id].range; mn=Math.min(mn,r[0]); mx=Math.max(mx,Math.min(r[1], 1+Math.floor(getStat(u,'mag')/2)));});
  for(const s of standableTiles(u,reach)) for(const [x,y] of ringTiles(s.x,s.y,mn,mx)) set.add(key(x,y));
  return set;
}
/* Positions from which u (after moving) can attack tile (tx,ty); returns [{x,y,cost,weapon,dist}] */
function attackPositions(u,tx,ty,reach){
  const out=[]; const ws=attackWeapons(u);
  for(const s of standableTiles(u,reach)){
    const d=Math.abs(s.x-tx)+Math.abs(s.y-ty);
    for(const w of ws){ const r=WEAPONS[w.id].range; if(d>=r[0]&&d<=r[1]){ out.push({x:s.x,y:s.y,cost:s.cost,weapon:w,dist:d}); break; } }
  }
  return out;
}
/* staff-reach positions to a target tile */
function staffPositions(u,tx,ty,reach){
  const out=[]; const ss=staffItems(u);
  for(const s of standableTiles(u,reach)){
    const d=Math.abs(s.x-tx)+Math.abs(s.y-ty);
    for(const w of ss){ const r=WEAPONS[w.id].range; const maxr=w.physic?(1+Math.floor(getStat(u,'mag')/2)):r[1];
      if(d>=r[0]&&d<=maxr){ out.push({x:s.x,y:s.y,cost:s.cost,staff:w,dist:d}); break; } }
  }
  return out;
}
/* ============================ SECTION 6 — ENEMY AI ===================================== */
function targetValue(t){
  let v=12;
  if(t.isLord) v+=10;                        // mild preference, not a laser magnet
  if(classOf(t.cls).canHeal) v+=14;
  v+=Math.max(0,(t.maxhp-t.hp))/3;          // prefer the wounded
  v+=(24-getStat(t,'def'))*0.4;             // prefer squishy
  if(t.faction==='green') v-=4;
  return v;
}
function equipForTarget(u,target,d){
  const ws=attackWeapons(u).filter(w=>{const r=WEAPONS[w.id].range;return d>=r[0]&&d<=r[1];});
  if(!ws.length) return false;
  let best=ws[0],bd=-1;
  for(const w of ws){ u.equipIdx=u.items.indexOf(w); const dm=rawDamage(u,target)+WEAPONS[w.id].crit*0.08; if(dm>bd){bd=dm;best=w;} }
  u.equipIdx=u.items.indexOf(best); return true;
}
function evalAttack(u,target,pos){
  const sx=u.x,sy=u.y,si=u.equipIdx; u.x=pos.x;u.y=pos.y;
  if(!equipForTarget(u,target,pos.dist)){ u.x=sx;u.y=sy;u.equipIdx=si; return null; }
  const f=forecast(u,target,pos.dist), a=f.a, c=f.counter;
  const nA=a.doubles?2:1, eHit=a.hit/100;
  let eDmg=Math.min(eHit*a.dmg*nA*(1+(a.crit/100)*2), target.hp*1.15);
  const kill=(a.dmg*nA>=target.hp && a.hit>=55)||(a.crit>=35 && a.dmg*3>=target.hp);
  let selfRisk=0,selfDeath=false;
  if(c){ const nC=c.doubles?2:1; selfRisk=(c.hit/100)*c.dmg*nC*(1+(c.crit/100)*2);
    if(c.dmg*nC>=u.hp && c.hit>=55) selfDeath=true; }
  let score=eDmg*2.2 + targetValue(target)*0.5 - selfRisk*1.4;
  if(kill) score+=80+targetValue(target);
  if(selfDeath && !kill) score-=120; else if(selfDeath && kill) score-=18;
  score+= terrainAt(mapChar(pos.x,pos.y)).def*2.2 + terrainAt(mapChar(pos.x,pos.y)).avo*0.12;
  const chosen=u.items[u.equipIdx];
  u.x=sx;u.y=sy;u.equipIdx=si;
  return {score,kill,pos,target,weaponIdx:u.items.indexOf(chosen),eDmg,selfDeath};
}
function distFieldTo(u,targets){
  const cost={}; const pq=[];
  for(const t of targets){ cost[key(t.x,t.y)]=0; pq.push([0,t.x,t.y]); }
  while(pq.length){ let bi=0;for(let i=1;i<pq.length;i++)if(pq[i][0]<pq[bi][0])bi=i;
    const [c,x,y]=pq.splice(bi,1)[0]; if(c>(cost[key(x,y)]??INF))continue;
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nx=x+dx,ny=y+dy; if(!inBounds(nx,ny))continue;
      const t=terrainAt(mapChar(nx,ny)); if(t.wall)continue;
      const step=moveCat(u)==='fly'?1:(t.c[moveCat(u)]??1); if(step===INF)continue;
      const nc=c+step,k=key(nx,ny); if(nc<(cost[k]??INF)){cost[k]=nc;pq.push([nc,nx,ny]);} } }
  return cost;
}
function aiApproach(u,reach,foes){
  if(!foes.length) return null;
  const field=distFieldTo(u,foes);
  let best=null,bv=INF;
  for(const s of standableTiles(u,reach)){
    const f=field[key(s.x,s.y)]; if(f==null)continue;
    const score=f - terrainAt(mapChar(s.x,s.y)).def*0.4;
    if(score<bv){bv=score;best=s;}
  }
  if(!best||(best.x===u.x&&best.y===u.y)) return null;
  return {type:'move',unit:u,pos:best};
}
function aiGoalMove(u,reach){
  const g=u.ai.goal; if(!g) return null;
  const field=distFieldTo(u,[g]); let best=null,bv=INF;
  for(const s of standableTiles(u,reach)){ const f=field[key(s.x,s.y)]; if(f!=null&&f<bv){bv=f;best=s;} }
  if(!best||(best.x===u.x&&best.y===u.y)) return null;
  return {type:'move',unit:u,pos:best};
}
function aiHeal(u,reach){
  const allies=B.units.filter(a=>a.hp>0&&a.faction===u.faction&&a.hp<a.maxhp&&(a.maxhp-a.hp)>=3);
  if(!allies.length) return null;
  allies.sort((a,b)=>(b.maxhp-b.hp)-(a.maxhp-a.hp));
  for(const a of allies){ const ps=staffPositions(u,a.x,a.y,reach);
    if(ps.length){ ps.sort((p,q)=>terrainAt(mapChar(q.x,q.y)).def-terrainAt(mapChar(p.x,p.y)).def);
      return {type:'heal',unit:u,target:a,pos:ps[0],staff:ps[0].staff}; } }
  return null;
}
function aiProvoked(u,beh){
  if(u.ai.provoked) return true;
  if(beh==='boss') return false;
  const maxR=attackWeapons(u).reduce((m,w)=>Math.max(m,WEAPONS[w.id].range[1]),1);
  const rng = beh==='guard' ? mov(u)+maxR : mov(u)+maxR+1;   // guards spring once you're within their reach
  if(B.units.some(t=>t.hp>0&&hostile(u.faction,t.faction)&&dist(u,t)<=rng)){ u.ai.provoked=true; return true; }
  return false;
}
function aiUnitAction(u){
  if(u.acted||u.hp<=0) return {type:'wait',unit:u};
  const beh=u.ai.behavior||'aggressive';
  const reach=reachable(u);
  if(classOf(u.cls).canHeal && staffItems(u).length){ const h=aiHeal(u,reach); if(h) return h; }
  const foes=B.units.filter(t=>t.hp>0 && hostile(u.faction,t.faction));
  let options=[];
  for(const t of foes) for(const pos of attackPositions(u,t.x,t.y,reach)){ const e=evalAttack(u,t,pos); if(e) options.push(e); }
  const active = beh==='aggressive' || aiProvoked(u,beh);
  if(beh==='boss') options=options.filter(o=>o.pos.x===u.x&&o.pos.y===u.y);
  if(beh==='guard' && !active) options=options.filter(o=>o.pos.x===u.x&&o.pos.y===u.y);
  if(options.length){
    options.sort((a,b)=>b.score-a.score);
    const best=options[0];
    // attack whenever we can deal real damage (or kill) and it isn't pure suicide for nothing
    const pointlessSuicide = best.selfDeath && !best.kill && best.eDmg<6;
    if((best.kill || best.eDmg>=1) && !pointlessSuicide) return {type:'attack',unit:u,target:best.target,pos:best.pos,weaponIdx:best.weaponIdx};
  }
  // No attack chosen — movement
  if(beh==='boss') return {type:'wait',unit:u};
  if(u.ai.goal){ const g=aiGoalMove(u,reach); if(g) return g; }
  if(active){ const mv=aiApproach(u,reach,foes); if(mv) return mv; }
  return {type:'wait',unit:u};
}

  else if(port.hat==='circlet'){ x.strokeStyle=port.accent; x.lineWidth=4; x.beginPath(); x.arc(cx,hy-30,30,Math.PI*1.15,Math.PI*1.85); x.stroke(); x.fillStyle=port.accent; x.beginPath(); x.arc(cx,hy-44,4,0,6.28); x.fill(); }

function shade(hex,amt){ const c=hex.replace('#',''); let r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16); r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255); return `rgb(${r|0},${g|0},${b|0})`; }
/* ============================ SECTION 9A — BATTLE STATE / TURN LOOP ===================== */
const G={ scene:'title', difficulty:'normal', casual:false, roster:[], convoy:[],
          chapterIdx:0, completed:[], seed:12345, version:1, turnTotal:0, deaths:[] };
const CHAPTERS=[]; // filled by content sections

/* Hard-only: signature skill for bosses that have none, by class. */
const _HARD_BOSS_SKILL={brigand:'wrath',general:'pavise',paladin:'pursuit',sorcerer:'vantage',berserker:'wrath',hero:'adept',swordmaster:'pursuit',sniper:'adept'};
function difficultyBump(u){
  if(G.difficulty!=='hard'||u.faction!=='enemy') return;
  // Hard: enemies a touch stronger & sometimes higher level
  STATS.forEach(s=>{ if(s==='hp') u.base.hp=Math.round(u.base.hp*1.12); else if(['str','skl','spd','def'].includes(s)) u.base[s]+=1; });
  if(u.isBoss && !(u.skills||[]).length){ const sk=_HARD_BOSS_SKILL[u.cls]; if(sk) u.skills.push(sk); }
  if(!u.isBoss && classOf(u.cls).tier===2){ u.base.skl+=1; u.base.spd+=1; }
  u.maxhp=u.base.hp=clamp(u.base.hp,1,statCapOf(u,'hp')); u.hp=u.maxhp;
  STATS.forEach(s=>u.base[s]=clamp(u.base[s],0,statCapOf(u,s)));
}
/* Give a generic enemy a slightly varied look so a pack isn't perfectly cloned. */
const _ENEMY_HAIR=['#3a2a1a','#5a3a2a','#2a2a2a','#6b5a3a','#1a1a2a','#4a2a18','#7a6a4a'];
const _ENEMY_SKIN=['#d8a878','#c8986a','#e0b088','#b88858','#caa07a'];
function enemyPort(u){
  const cl=classOf(u.cls), h=(u.uid*2654435761)>>>0;
  const hat = (cl.move==='armor'||cl.move==='horse')?'helm'
            : (cl.sprite==='mage'||cl.sprite==='staff')?'hood'
            : cl.sprite==='peg'?'wing' : 'hair';
  return { skin:_ENEMY_SKIN[h%_ENEMY_SKIN.length], hair:_ENEMY_HAIR[(h>>>4)%_ENEMY_HAIR.length],
           cloth:FCOL[u.faction].badge, accent:FCOL[u.faction].ring, hat };
}
function instantiateEnemy(e){
  let u;
  if(e.rosterId){
    const t=Object.assign({}, ROSTER[e.rosterId], {x:e.x,y:e.y,level:e.level||ROSTER[e.rosterId].level,
      ai:e.ai||{behavior:'guard'}, items:e.items||ROSTER[e.rosterId].items});
    u=makeUnit(t, e.faction||'enemy'); u.templateId=e.rosterId;
    u.isRecruit=true; u.recruitBy=e.recruitBy||'lyra'; u.recruitScript=e.recruitScript||null;
  } else {
    const tpl={cls:e.cls,level:e.level,x:e.x,y:e.y,items:e.items||defaultItemsFor(e.cls),
      ranks:e.ranks,skills:e.skills,ai:e.ai,isBoss:e.isBoss,name:e.name,drop:e.drop,
      growths:e.growths, base:e.base};
    u=makeUnit(tpl, e.faction||'enemy');
    u.templateId=e.templateId||null;
  }
  if(e.goal) u.ai.goal=e.goal;
  if(!e.rosterId){   // named bosses/NPCs get their portrait palette; generics get varied colors
    const pk=e.name&&e.name.toLowerCase();
    if(pk&&PORTS[pk]&&PORTS[pk].port) u.port=deepCopy(PORTS[pk].port);
    else u.port=enemyPort(u);
  }
  u.maxhp=u.base.hp; u.hp=u.maxhp; if(!e.rosterId) difficultyBump(u);
  u.rx=u.x; u.ry=u.y; return u;
}
function defaultItemsFor(cls){
  const w=classOf(cls).weapons[0];
  const pick={sword:'iron_sword',lance:'iron_lance',axe:'iron_axe',bow:'iron_bow',anima:'fire',light:'lightning',dark:'flux',staff:'heal'}[w]||'iron_sword';
  return [pick];
}

function buildBattle(chapter, deployed, silent){
  R.reset();
  B={ chapter, w:chapter.map.w, h:chapter.map.h, map:chapter.map.tiles.slice(),
      units:[], turn:'player', turnCount:1, state:'free',
      cursor:{x:0,y:0}, sel:null, reach:null, overlay:{}, objective:chapter.objective,
      pendingUndo:null, over:false, win:false, hideCursor:false,
      recruitedThisChapter:[], showThreat:!!G.showThreatDefault, pinned:new Set(),
      reinfDone:{}, combatLog:[], logOpen:false };
  // place deployed player units
  const dt=chapter.deploy.tiles;
  deployed.forEach((u,i)=>{ const t=dt[i]||dt[dt.length-1]; u.x=t.x; u.y=t.y; u.rx=u.x; u.ry=u.y;
    u.hp=u.maxhp; u.acted=false; u.statuses={}; u._fade=1; u._flash=0; if(u.ai)u.ai.provoked=false; B.units.push(u); });
  // enemies & greens
  (chapter.enemies||[]).forEach(e=>B.units.push(instantiateEnemy(Object.assign({faction:'enemy'},e))));
  if(G.difficulty==='hard' && chapter.hardExtra) B.units.push(instantiateEnemy(Object.assign({faction:'enemy'},chapter.hardExtra)));
  (chapter.greens||[]).forEach(e=>B.units.push(instantiateEnemy(Object.assign({faction:'green'},e))));
  linkSupports();
  const lord=B.units.find(u=>u.isLord)||B.units.find(u=>u.faction==='player')||B.units[0];
  B.cursor={x:lord.x,y:lord.y};
  if(B.objective.escortId){ const es=B.units.find(u=>u.templateId===B.objective.escortId||u.name===B.objective.escortId); if(es)B._escortUid=es.uid; }
  if(silent){ B.turn='player'; players().forEach(u=>u.acted=false); B.state='free'; return; }
  R.focus(lord.x,lord.y,true);
  G.scene='battle'; show('#topbar');
  hideAllPanels(); updateHUD(); refreshInfoCard();
  beginPlayerPhase(true);
}

function aliveOf(f){ return B.units.filter(u=>u.faction===f && u.hp>0); }
function enemies(){ return aliveOf('enemy'); }
function players(){ return aliveOf('player'); }

function beginPlayerPhase(first){
  B.turn='player'; B.state='free'; B.sel=null; B.overlay={};
  logTurnHeader('Player Phase');
  players().forEach(u=>{ u.acted=false; });
  phaseStartHeal('player');
  updateHUD();
  SFX.phase();
  MUSIC.play('map');
  bannerShow('PLAYER PHASE','#4ea0ff', ()=>{
    autosaveLocal();
    refreshFree();
  });
}
function phaseStartHeal(f){
  aliveOf(f).forEach(u=>{
    let healed=0;
    const ter=terrainAt(mapChar(u.x,u.y));
    if(ter.heal>0 && u.hp<u.maxhp){ healed=Math.max(healed, Math.ceil(u.maxhp*ter.heal)); }
    if(hasSkill(u,'renewal') && u.hp<u.maxhp){ healed=Math.max(healed, Math.ceil(u.maxhp*0.2)); }
    if(healed>0){ const amt=Math.min(healed,u.maxhp-u.hp); u.hp=clamp(u.hp+amt,0,u.maxhp); R.floatText(u.x,u.y,'+'+amt,'#5fd86a'); }
  });
}
function updateHUD(){
  $('#phaseTag').textContent=(B.turn==='player'?'PLAYER PHASE':B.turn==='enemy'?'ENEMY PHASE':'ALLY PHASE');
  $('#phaseTag').style.background=B.turn==='player'?'rgba(78,160,255,.22)':B.turn==='enemy'?'rgba(255,93,84,.22)':'rgba(95,216,106,.22)';
  $('#phaseTag').style.color=B.turn==='player'?'#9fd0ff':B.turn==='enemy'?'#ffb0aa':'#aee9b6';
  $('#turnNum').textContent=B.turnCount;
  $('#objText').innerHTML='<b>'+objectiveLabel()+'</b>';

  const playerTurn=(B.turn==='player'&&!B.over);
  const be=$('#btnEnd'), bm=$('#btnMenu'); if(be)be.classList.toggle('off',!playerTurn); if(bm)bm.classList.toggle('off',!playerTurn);
  renderRoster();
}
function objectiveLabel(){
  const o=B.objective;
  switch(o.type){
    case 'rout': return 'Rout: '+enemies().length+' foes left';
    case 'boss': return 'Defeat '+(o.bossName||'the commander');
    case 'seize': return 'Seize the '+(o.tileName||'throne');
    case 'escape': return 'Escape with Lyra';
    case 'defend': return 'Defend — Turn '+B.turnCount+'/'+o.turns;
    case 'survive': return 'Survive — Turn '+B.turnCount+'/'+o.turns;
    default: return o.desc||'';
  }
}

/* ---- end of player phase → enemy phase ---- */
function endPlayerPhase(){
  if(B.over) return;
  accrueSupports();
  if(checkEnd()) return;
  B.sel=null; B.overlay={}; hideAllPanels(); B.state='animating';
  beginEnemyPhase();
}
async function beginEnemyPhase(){
  B.turn='enemy'; logTurnHeader('Enemy Phase'); updateHUD(); SFX.phase(); MUSIC.play('enemy');
  await bannerAsync('ENEMY PHASE','#ff5d54');
  spawnReinforcements('enemy');
  phaseStartHeal('enemy');
  if(checkEnd()) return;
  await runFactionAI('enemy');
  if(checkEnd()) return;
  // green phase
  if(aliveOf('green').length){ B.turn='green'; updateHUD(); await runFactionAI('green'); if(checkEnd()) return; }
  nextTurn();
}
function nextTurn(){
  B.turnCount++; updateHUD();
  // objective turn-based wins
  const o=B.objective;
  if((o.type==='defend'||o.type==='survive') && B.turnCount>o.turns){ return doWin(); }
  spawnReinforcements('player');
  if(checkEnd()) return;
  beginPlayerPhase(false);
}
function spawnReinforcements(side){
  (B.chapter.reinforcements||[]).forEach((r,i)=>{
    if(r.turn===B.turnCount && (r.side||'enemy')===side && !B.reinfDone[i]){
      B.reinfDone[i]=true;
      (r.units||[]).forEach(e=>{ const u=instantiateEnemy(Object.assign({faction:r.faction||'enemy'},e)); B.units.push(u); R.ring(u.x,u.y,'#ff9d3b'); });
      toast('Reinforcements arrive!','warn');
      logLine('<span style="color:var(--orange)">Reinforcements arrive!</span>');
    }
  });
}
function accrueSupports(){
  for(const u of players()){ if(!u.supports) continue;
    for(const s of u.supports){ const p=B.units.find(x=>x.uid===s.with&&x.faction==='player'&&x.hp>0);
      if(p && Math.max(Math.abs(p.x-u.x),Math.abs(p.y-u.y))<=3){ s.points=(s.points||0)+2;
        const nr=s.points>=64?3:s.points>=34?2:s.points>=10?1:0;
        if(nr>(s.rank||0)){ s.rank=nr; const pr=p.supports&&p.supports.find(z=>z.with===u.uid); if(pr){pr.rank=nr;pr.points=s.points;}
          maybeSupportConvo(u,p,nr); }
      }
    }
  }
}

/* ---- objective / win-lose ---- */
function lordUnit(){ return B.units.find(u=>u.isLord); }
function checkEnd(){
  if(B.over) return true;
  // lose: lord dead
  const lord=lordUnit();
  if(lord && lord.hp<=0){ doLose('Lyra has fallen.'); return true; }
  if(players().length===0){ doLose('Your army was wiped out.'); return true; }
  if(B.objective.escortId && B._escortUid && !B.units.some(u=>u.uid===B._escortUid && u.hp>0)){ doLose('The one you swore to protect has fallen.'); return true; }
  // win
  const o=B.objective;
  if(o.type==='rout' && enemies().length===0){ doWin(); return true; }
  if(o.type==='boss'){ const boss=B.units.find(u=>u.isBoss); if(!boss||boss.hp<=0){ doWin(); return true; } }
  return false;
}
function doWin(){ if(B.over)return; B.over=true; B.win=true; MUSIC.stop(0.4); SFX.victory();
  bannerShow('VICTORY','#f2c14e', ()=>{ setTimeout(()=>winChapter(),700); }); }
function doLose(msg){ if(B.over)return; B.over=true; B.win=false; MUSIC.stop(0.4); SFX.defeat();
  bannerShow('DEFEAT','#ff5d54', ()=>{ setTimeout(()=>gameOver(msg),700); }); }

function winChapter(){
  // remove permadead from roster already handled at death; surviving deployed keep state
  G.completed[B.chapter.idx]=true;
  hideAllPanels(); hide('#topbar');
  runDialogue(B.chapter.post||[], ()=> showResults());
}
/* ============================ DOM / UI HELPERS ========================================= */
function show(s){ const n=typeof s==='string'?$(s):s; n.classList.remove('hidden'); }
function hide(s){ const n=typeof s==='string'?$(s):s; n.classList.add('hidden'); }
function hideAllPanels(){ ['#menu','#forecast','#listpanel'].forEach(hide); }
function toast(msg,kind){ const t=el('div','t'+(kind?' '+kind:''),msg); $('#toast').appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},1500); }
function bannerShow(text,col,cb){ const b=$('#bannerTxt'); b.textContent=text; b.style.color=col; b.classList.remove('anim-banner'); void b.offsetWidth; b.classList.add('anim-banner'); if(cb) setTimeout(cb,820); }
function bannerAsync(text,col){ return new Promise(res=>bannerShow(text,col,res)); }
function tileScreen(x,y){ return { x:x*TS-R.cam.x, y:y*TS-R.cam.y+VIEW_Y }; }
function anchorPanel(node, tileX, tileY){
  const s=tileScreen(tileX,tileY); const rect=node.getBoundingClientRect(); const sw=960,sh=600;
  let px=s.x+TS+6, py=s.y; if(px+node.offsetWidth>sw-6) px=s.x-node.offsetWidth-6; if(px<6)px=6;
  if(py+node.offsetHeight>sh-6) py=sh-node.offsetHeight-6; if(py<VIEW_Y+4)py=VIEW_Y+4;
  node.style.left=px+'px'; node.style.top=py+'px';
}

/* ============================ SECTION 9B — PLAYER INPUT / MENUS ========================= */
const Menu={
  node:null, items:[], idx:0, onCancel:null,
  show(sel, items, onCancel, anchorTile){
    ['#menu','#listpanel','#forecast'].forEach(s=>{ if(s!==sel) hide(s); });   // never leave another panel overlapping
    this.node=$(sel); this.items=items.filter(Boolean); this.idx=0; this.onCancel=onCancel;
    let i0=this.items.findIndex(it=>!it.dis); this.idx=i0<0?0:i0;
    this.render(); show(this.node);
    if(anchorTile) anchorPanel(this.node, anchorTile.x, anchorTile.y);
  },
  render(){
    const n=this.node; n.innerHTML=''; this._rows=[];
    if(this.title) n.appendChild(el('div','ttl',this.title));
    this.items.forEach((it,i)=>{
      const d=el('div','item'+(it.dis?' dis':''));
      d.innerHTML=`<span>${it.label}</span>`+(it.sub?`<span class="${it.subClass||'k'}">${it.sub}</span>`:'');
      d.onmouseenter=()=>{ if(!it.dis){ this.idx=i; this.highlight(); } };   // highlight only, never rebuild mid-click
      d.onclick=(e)=>{ if(e)e.stopPropagation(); if(it.dis){SFX.error();return;} this.idx=i; SFX.select(); it.act&&it.act(); };
      n.appendChild(d); this._rows.push(d);
    });
    this.highlight();
  },
  highlight(){ if(this._rows) this._rows.forEach((d,i)=>d.classList.toggle('sel', i===this.idx)); },
  move(d){ if(!this.items.length)return; let i=this.idx; for(let k=0;k<this.items.length;k++){ i=(i+d+this.items.length)%this.items.length; if(!this.items[i].dis)break; } this.idx=i; SFX.cursor(); this.highlight(); },
  confirm(){ const it=this.items[this.idx]; if(!it||it.dis){SFX.error();return;} SFX.select(); it.act&&it.act(); },
  cancel(){ SFX.back(); if(this.onCancel)this.onCancel(); },
};
function setTitle(t){ Menu.title=t; }

const WTYPE_COL={sword:'#79b4ff',lance:'#7fe0a0',axe:'#ff9d6b',bow:'#cdb86a',anima:'#ff9d3b',light:'#ffe79a',dark:'#b07cff',staff:'#7ec5ff'};

/* ---- cursor ---- */
function moveCursor(dx,dy){ B.cursor.x=clamp(B.cursor.x+dx,0,B.w-1); B.cursor.y=clamp(B.cursor.y+dy,0,B.h-1); R.focus(B.cursor.x,B.cursor.y); SFX.cursor(); onCursorMoved(); }
function hoverTile(x,y){ if(x===B.cursor.x&&y===B.cursor.y)return; B.cursor.x=clamp(x,0,B.w-1); B.cursor.y=clamp(y,0,B.h-1); onCursorMoved(); }

function updatePathPreview(){

/* ---- selection ---- */
function selectUnit(u){
  B.sel=u; B.reach=reachable(u);
  const move=new Set(standableTiles(u,B.reach).map(s=>key(s.x,s.y)));
  const atk=threatTiles(u,B.reach); for(const k of move) atk.delete(k);
  const staff=staffTiles(u,B.reach); for(const k of move) staff.delete(k);
  B.overlay={ move, atk, staff, sel:{x:u.x,y:u.y}, path:[], pin:pinnedThreat() };
  B.state='selected'; B.cursor={x:u.x,y:u.y}; updatePathPreview(); SFX.select(); refreshInfoCard(); renderRoster();
}
function deselect(){ B.sel=null; B.state='free'; refreshFree(); SFX.back(); }

function commitMove(u, x,y, then){
  const path=pathTo(B.reach,x,y)||[{x:u.x,y:u.y}];
  B.pendingUndo={x:u.x,y:u.y};
  B.state='animating'; hideAllPanels();

}
function undoMove(){
  const u=B.sel; if(B.pendingUndo){ u.x=B.pendingUndo.x; u.y=B.pendingUndo.y; u.rx=u.x; u.ry=u.y; B.pendingUndo=null; }

/* ---- post-move action menu ---- */
function openActionMenu(u){
  B.state='menu'; B.cursor={x:u.x,y:u.y}; R.focus(u.x,u.y);
  hide('#forecast'); hide('#listpanel');
  B.overlay={ sel:{x:u.x,y:u.y} };
  const targets=enemiesInRangeFrom(u);
  const healTargets=healTargetsFrom(u);
  const adjAlly=adjacentAllies(u);
  const talk=talkTargetFor(u);
  const onSeize=isSeizeTileFor(u);
  const items=[];
  if(targets.length) items.push({label:'Attack',sub:'A',act:()=>startTargetSelect(u)});
  if(healTargets.length) items.push({label:'Staff',sub:'S',act:()=>startStaffSelect(u)});
  if(talk) items.push({label:'Talk',sub:'T',act:()=>doTalk(u,talk)});
  if(onSeize) items.push({label: B.objective.type==='escape'?'Escape':'Seize',sub:'Z',act:()=>doSeize(u)});
  if(visitTileFor(u)) items.push({label:'Visit',act:()=>doVisit(u)});
  if(adjAlly.length) items.push({label:'Trade',act:()=>openTrade(u,adjAlly)});
  items.push({label:'Item',sub:'I',act:()=>openItemMenu(u)});
  items.push({label:'Wait',sub:'W',act:()=>finishUnitAction(u)});
  setTitle(null);
  Menu.show('#menu', items, ()=>undoMove(), {x:u.x,y:u.y});
}
function finishUnitAction(u){ u.acted=true; u.statuses=u.statuses||{}; B.pendingUndo=null; hideAllPanels(); if(!checkEnd()) refreshFree(); }

/* ---- target helpers ---- */
function enemiesInRangeFrom(u){
  const out=[]; const ws=attackWeapons(u); if(!ws.length) return out;
  const eq=equippedWeapon(u);
  for(const t of B.units){ if(t.hp<=0||!hostile(u.faction,t.faction)) continue;
    const d=Math.abs(t.x-u.x)+Math.abs(t.y-u.y);
    let best=null;
    if(eq){ const r=WEAPONS[eq.id].range; if(d>=r[0]&&d<=r[1]) best=eq; }   // the player's equipped choice wins when it can reach
    if(!best) for(const w of ws){ const r=WEAPONS[w.id].range; if(d>=r[0]&&d<=r[1]){ if(!best||WEAPONS[w.id].mt>WEAPONS[best.id].mt) best=w; } }
    if(best) out.push({unit:t,dist:d,weapon:best});
  }
  return out;
}
function healTargetsFrom(u){
  const out=[]; const ss=staffItems(u); if(!ss.length) return out;
  for(const a of B.units){ if(a.hp<=0||a.faction!==u.faction||a.uid===u.uid||a.hp>=a.maxhp) continue;
    const d=Math.abs(a.x-u.x)+Math.abs(a.y-u.y);
    for(const w of ss){ const r=WEAPONS[w.id].range, mx=w.physic?(1+Math.floor(getStat(u,'mag')/2)):r[1]; if(d>=r[0]&&d<=mx){ out.push({unit:a,staff:w,dist:d}); break; } }
  }
  return out;
}
function adjacentAllies(u){ return B.units.filter(a=>a.hp>0&&a.faction==='player'&&a.uid!==u.uid&&dist(a,u)===1); }
function talkTargetFor(u){
  for(const t of B.units){ if(t.hp>0 && dist(t,u)===1 && t.isRecruit && t.faction!=='player' && (t.recruitBy==='any'||t.recruitBy===u.templateId||u.isLord)) return t; }
  return null;
}
function isSeizeTileFor(u){
  const o=B.objective;
  if(o.type==='seize' && o.tile && u.x===o.tile.x && u.y===o.tile.y) return true;
  if(o.type==='escape' && o.tiles && o.tiles.some(t=>t.x===u.x&&t.y===u.y) && u.isLord) return true;
  return false;
}
function visitTileFor(u){ const ev=(B.chapter.villages||[]).find(v=>!v.done&&v.x===u.x&&v.y===u.y); return ev||null; }

/* ---- attack target selection ---- */
function startTargetSelect(u, prefer){

  B.state='target'; B.overlay={sel:{x:u.x,y:u.y}, atk:new Set(B.atkList.map(t=>key(t.unit.x,t.unit.y)))};
  let idx=0; if(prefer){ const j=B.atkList.findIndex(z=>z.unit.x===prefer.x&&z.unit.y===prefer.y); if(j>=0) idx=j; }

function showForecast(att,def,d,preview){
  const fc=forecast(att,def,d); const a=fc.a, c=fc.counter;
  const predD=Math.max(0,def.hp - a.dmg*(a.doubles?2:1));
  const predA=c?Math.max(0,att.hp - c.dmg*(c.doubles?2:1)):att.hp;
  const fcol=u=>FCOL[u.faction].ring;
  const col=(att,sideDmg,doubles,hit,crit,hpNow,hpMax,hpPred)=>`
    <div class="fc-col">
      <div class="fc-nm" style="color:${fcol(att)}">${att.name}</div>
      <div class="hpprev"><span class="cur" style="width:${hpPred/hpMax*100}%"></span><span class="dmg" style="width:${(hpNow-hpPred)/hpMax*100}%"></span></div>
      <div class="fc-row"><span>HP</span><b>${hpNow} → ${hpPred}</b></div>
      <div class="fc-row"><span>Dmg</span><b>${sideDmg==null?'—':sideDmg}${doubles?' <span class="x2">×2</span>':''}</b></div>
      <div class="fc-row"><span>Hit</span><b>${sideDmg==null?'—':hit+'%'}</b></div>
      <div class="fc-row"><span>Crit</span><b>${sideDmg==null?'—':crit+'%'}</b></div>
    </div>`;
  const fcN=$('#forecast');
  const eff=a.eff?'<span style="color:#ff9d3b">effective!</span>':'';
  fcN.innerHTML=`<div class="fc-h"><span>${WEAPONS[equippedWeapon(att).id].name}</span><span>${eff} dist ${d}</span></div>
    <div class="fc-body">${col(att,a.dmg,a.doubles,a.hit,a.crit,att.hp,att.maxhp,predA)}${col(def, c?c.dmg:null, c&&c.doubles, c?c.hit:0, c?c.crit:0, def.hp,def.maxhp,predD)}</div>
    ${preview?'<div class="hover-hint">▸ Click this foe to engage</div>':'<div class="fc-act"><button class="btn sm" id="fcNo">Back</button><button class="btn gold sm" id="fcGo">Attack ▸</button></div>'}`;
  show(fcN); anchorPanel(fcN, def.x, def.y);
  if(!preview){ $('#fcGo').onclick=()=>confirmAttack(); $('#fcNo').onclick=()=>{ hide('#forecast'); openActionMenu(B.sel); }; }
}
function showSelectPreview(u,enemy){
  if(!attackWeapons(u).length){ hide('#forecast'); return; }
  const aps=attackPositions(u,enemy.x,enemy.y,B.reach);
  if(!aps.length){ hide('#forecast'); return; }
  aps.sort((a,b)=>a.cost-b.cost); const p=aps[0];
  const sx=u.x,sy=u.y,si=u.equipIdx; u.x=p.x;u.y=p.y;
  const eq=equippedWeapon(u), er=eq&&WEAPONS[eq.id].range;
  if(er && p.dist>=er[0] && p.dist<=er[1]){ /* keep the player's equipped weapon */ }
  else equipForTarget(u,enemy,p.dist);
  showForecast(u,enemy,p.dist,true);
  u.x=sx;u.y=sy;u.equipIdx=si;
}
function startStaffSelect(u){

  if(!B.healList.length){ openActionMenu(u); return; }
  hide('#menu'); hide('#listpanel');
  B.healIdx=0; B.state='stafftarget'; B.overlay={sel:{x:u.x,y:u.y}, staff:new Set(B.healList.map(t=>key(t.unit.x,t.unit.y)))};

/* ---- item / trade / talk / seize / visit ---- */
function openItemMenu(u){
  const items=u.items.map((it,i)=>{
    const wpn=isWeaponItem(it); const usable=wpn?canUse(u,it):true;
    const sub= wpn? (it.uses<99?it.uses+'':'') : (it.uses>1?it.uses+'':'');
    let label=(WEAPONS[it.id]?WEAPONS[it.id].name:ITEMS[it.id].name);
    let act;
    if(wpn && !isStaff(it)){ label=(u.equipIdx===i?'▸ ':'')+label; act=()=>{ if(usable){ equipItem(u,it); SFX.select(); openItemMenu(u); } else SFX.error(); }; }
    else if(isStaff(it)){ act=()=>{ startStaffSelect(u); }; }
    else { act=()=>useItem(u,it); }
    return {label, sub, dis: wpn&&!isStaff(it)&&!usable, act};
  });
  items.push({label:'‹ Back',act:()=>openActionMenu(u)});
  setTitle('Items'); Menu.show('#listpanel', items, ()=>openActionMenu(u), {x:u.x,y:u.y});
}
function useItem(u,it){
  const def=ITEMS[it.id]; if(!def){ SFX.error(); return; }
  if(def.kind==='heal'){ const before=u.hp; u.hp=clamp(u.hp+(def.amount>=999?u.maxhp:def.amount),0,u.maxhp); it.uses--; R.floatText(u.x,u.y,'+'+(u.hp-before),'#5fd86a'); SFX.heal(); }
  else if(def.kind==='boost'){ applyBoost(u,def); it.uses--; SFX.levelup(); toast(`${u.name} ${def.desc}`,'good'); }
  else if(def.kind==='res'){ u.statuses.res=(u.statuses.res||0)+def.amount; it.uses--; SFX.heal(); }
  else if(def.kind==='promo'){ if(canPromote(u) && promoMatches(u,it)){ hideAllPanels(); B.state='cutscene';
      startPromotion(u,it,(ok)=>{ if(ok){ finishUnitAction(u); } else { B.state='menu'; openItemMenu(u); } }); return; }
    else { SFX.error(); toast('Cannot promote this unit yet.'); return; } }
  else { SFX.error(); return; }
  if(it.uses<=0) u.items.splice(u.items.indexOf(it),1);
  finishUnitAction(u);
}
function applyBoost(u,def){ if(def.stat==='maxhp'){ u.base.hp=clamp(u.base.hp+def.amount,0,statCapOf(u,'hp')); u.maxhp=u.base.hp; u.hp=clamp(u.hp+def.amount,0,u.maxhp); } else if(def.stat==='mov'){ u.movBonus=(u.movBonus||0)+def.amount; } else { u.base[def.stat]=clamp((u.base[def.stat]||0)+def.amount,0,statCapOf(u,def.stat)); } }
function promoMatches(u,it){ const tag=classOf(u.cls).promoTag; const f=ITEMS[it.id].forTags; return f.includes('any')||f.includes(tag); }
function openTrade(u,allies){
  const items=allies.map(a=>({label:'Trade with '+a.name,act:()=>tradeWith(u,a)}));
  items.push({label:'‹ Back',act:()=>openActionMenu(u)});
  setTitle('Trade'); Menu.show('#listpanel', items, ()=>openActionMenu(u), {x:u.x,y:u.y});
}
function tradeWith(u,a){
  const build=()=>{
    const items=[];
    items.push({label:`— ${u.name} —`,dis:true});
    u.items.forEach(it=>items.push({label:(WEAPONS[it.id]?WEAPONS[it.id].name:ITEMS[it.id].name), sub:'▸ '+a.name, act:()=>{ if(a.items.length<6){ a.items.push(it); u.items.splice(u.items.indexOf(it),1); equipBest(u);equipBest(a); render(); } else toast('Inventory full'); }}));
    items.push({label:`— ${a.name} —`,dis:true});
    a.items.forEach(it=>items.push({label:(WEAPONS[it.id]?WEAPONS[it.id].name:ITEMS[it.id].name), sub:'◂ '+u.name, act:()=>{ if(u.items.length<6){ u.items.push(it); a.items.splice(a.items.indexOf(it),1); equipBest(u);equipBest(a); render(); } else toast('Inventory full'); }}));

function battleKey(k){
  if(B.over) return;
  if(B.state==='animating'||B.state==='cutscene') return;
  if(['menu'].includes(B.state)){ if(k==='ArrowUp')Menu.move(-1); else if(k==='ArrowDown')Menu.move(1); else if(k===' '||k==='Enter')Menu.confirm(); else if(k==='Escape'||k==='Backspace')Menu.cancel(); else hotkeyMenu(k); return; }
  if(Menu.node&&Menu.node.id==='listpanel'&&!Menu.node.classList.contains('hidden')){ if(k==='ArrowUp')Menu.move(-1); else if(k==='ArrowDown')Menu.move(1); else if(k===' '||k==='Enter')Menu.confirm(); else if(k==='Escape'||k==='Backspace')Menu.cancel(); return; }
  if(B.state==='target'){ if(k==='ArrowLeft'||k==='ArrowUp')selectAtkTarget(B.atkIdx-1); else if(k==='ArrowRight'||k==='ArrowDown')selectAtkTarget(B.atkIdx+1); else if(k===' '||k==='Enter')confirmAttack(); else if(k==='Escape'||k==='Backspace'){ hide('#forecast'); openActionMenu(B.sel);} return; }
  if(B.state==='stafftarget'){ if(k==='ArrowLeft'||k==='ArrowUp')selectHealTarget(B.healIdx-1); else if(k==='ArrowRight'||k==='ArrowDown')selectHealTarget(B.healIdx+1); else if(k===' '||k==='Enter')confirmHeal(); else if(k==='Escape'||k==='Backspace'){ hide('#forecast'); openActionMenu(B.sel);} return; }
  if(B.state==='turnmenu'){ if(k==='ArrowUp')Menu.move(-1); else if(k==='ArrowDown')Menu.move(1); else if(k===' '||k==='Enter')Menu.confirm(); else if(k==='Escape'||k==='Backspace')Menu.cancel(); return; }
  // free / selected: cursor
  if(k==='ArrowUp')moveCursor(0,-1); else if(k==='ArrowDown')moveCursor(0,1);
  else if(k==='ArrowLeft')moveCursor(-1,0); else if(k==='ArrowRight')moveCursor(1,0);
  else if(k===' '||k==='Enter') confirmTile();
  else if(k==='Escape'||k==='Backspace'){ if(B.state==='selected')deselect(); else openTurnMenu(); }
  else if(k==='e'||k==='E'){ if(B.state==='free')endPlayerPhase(); }
  else if(k==='d'||k==='D'){ B.showThreat=!B.showThreat; if(B.state==='free')refreshFree(); toast('Danger zone '+(B.showThreat?'on':'off')); }
  else if(k==='l'||k==='L'){ toggleCombatLog(); }
  else if(k==='t'||k==='T'){ if(B.state==='free'){ const u=unitAt(B.cursor.x,B.cursor.y); if(u){ if(togglePin(u)) refreshFree(); else showUnitThreat(u); } } }
  else if(k==='c'||k==='C'){ if(B.state==='free'){ const u=unitAt(B.cursor.x,B.cursor.y); if(u) openUnitDetail(u); else openClassCompendium(); } }
}
function hotkeyMenu(k){ const map={a:'Attack',s:'Staff',i:'Item',w:'Wait',t:'Talk',z:'Seize'}; const lbl=map[k.toLowerCase()]; if(!lbl)return; const it=Menu.items.find(x=>x.label.replace('Escape','Seize')===lbl||x.label===lbl); if(it&&!it.dis){SFX.select();it.act();} }

async function animateMovePath(u,path){
  if(!path||path.length<2){ u.rx=u.x; u.ry=u.y; return; }
  u._anim=true;
  for(let i=1;i<path.length;i++){ const a=path[i-1],b=path[i]; SFX.move();
    await R.tween(82,(k)=>{ u.rx=lerp(a.x,b.x,k); u.ry=lerp(a.y,b.y,k); }, ease.lin); }
  u.rx=path[path.length-1].x; u.ry=path[path.length-1].y; u._anim=false;
}
function diffStats(a,b){ const o={}; STATS.forEach(s=>o[s]=(b[s]||0)-(a[s]||0)); return o; }

async function performAttack(att,def,d){
  B.state='animating'; hideAllPanels();
  const aStart=att.hp, dStart=def.hp;
  const fcPre=forecast(att,def,d);
  const res=resolveCombat(att,def,d);
  logCombatEvents(res.log);
  if(G.battleAnims!==false && !R.instant && res.log.length){
    try{ await BA.play(att,def,res.log,aStart,dStart,fcPre); }
    catch(e){ console.error('[TF] battle scene error (recovered):',e);
      BA.active=false; R.freeze=0; show('#topbar'); toast('Battle scene skipped (error)','warn'); }
  } else {
    for(const ev of res.log){ await animateStrike(ev); }
  }
  let pendingLose=null;
  const dead=[...new Set([def,att,...res.log.map(e=>e.defender),...res.log.map(e=>e.attacker)])].filter(u=>u&&u.hp<=0&&B.units.includes(u));
  for(const u of dead){ const r=await killUnit(u); if(r) pendingLose=r; }
  if(!pendingLose){ for(const g of res.exp){ if(g.unit.hp>0&&B.units.includes(g.unit)) await awardExp(g.unit,g.amount); } }
  B.state='free';
  if(pendingLose) doLose(pendingLose);
}
async function animateStrike(ev){
  const a=ev.attacker, d=ev.defender; if(!B.units.includes(a)||!B.units.includes(d)) return;
  R.focus(d.x,d.y);
  const dx=sgn(d.x-a.x), dy=sgn(d.y-a.y);
  await R.tween(120,(k)=>{ const f=Math.sin(k*Math.PI); a.ax=dx*f*11; a.ay=dy*f*11; }, ease.lin);
  a.ax=0; a.ay=0;
  if(ev.miss){ R.floatText(d.x,d.y,'MISS','#dbe3f0'); SFX.miss(); await wait(190); return; }
  d._flash=1; R.tween(240,(k)=>{ d._flash=1-k; });
  if(ev.crit){ R.shake(9,380); R.flash('#ffffff',.55); SFX.crit(); R.spark(d.x,d.y,'#ffd86a',20);
    R.floatText(d.x,d.y,ev.dmg+'!',ev.dmg>0?'#ff5d54':'#dbe3f0',{size:26}); }
  else { R.shake(3,170); SFX.hit(); R.spark(d.x,d.y,ev.eff?'#ff9d3b':'#ff7a6a',ev.eff?14:9);
    R.floatText(d.x,d.y,String(ev.dmg),ev.dmg>0?'#ffffff':'#dbe3f0'); }
  if(ev.eff) R.floatText(d.x,d.y,'effective',' #ff9d3b',{dy:-46,size:12});
  if(ev.heal>0) R.floatText(a.x,a.y,'+'+ev.heal,'#5fd86a',{dy:-24});
  ev.procs.forEach((p,i)=> R.floatText(a.x,a.y,p,'#c8a8ff',{dy:-44-i*15,size:13}));
  await wait(ev.crit?430:250);
}
async function killUnit(u){
  if(!B.units.includes(u)) return null;
  if(!(u._dying && (u._fade!=null && u._fade<=0.05))){   // skip if the battle scene already played the death
    SFX.death(); u._dying=true; await R.tween(440,(k)=>{ u._fade=1-k; });
  }
  if(u.drop){ const it=WEAPONS[u.drop]?mkWeapon(u.drop):mkItem(u.drop); if(it){ G.convoy.push(it); toast('Recovered '+(WEAPONS[u.drop]?WEAPONS[u.drop].name:ITEMS[u.drop].name),'good'); } }
  B.units.splice(B.units.indexOf(u),1);
  let lose=null;
  if(u.isLord) lose='Lyra has fallen. Without her, the cause is lost.';
  if(B._escortUid && u.uid===B._escortUid) lose='The one you swore to protect has fallen.';
  if(u.faction==='player'){ G.deaths.push(u.name);
    if(G.casual){ u._revive=true; if(!G._fallen)G._fallen=[]; G._fallen.push(u); }
    else { const i=G.roster.indexOf(u); if(i>=0) G.roster.splice(i,1); }
    if(!lose) toast(u.name+' has fallen'+(G.casual?' (will recover)':''),'warn');
  }
  return lose;
}

/* ---- AI phase runner ---- */
async function runFactionAI(faction){
  const list=B.units.filter(u=>u.faction===faction&&u.hp>0);
  list.forEach(u=>{ u.acted=false; });   // FIX: start every AI phase fresh (was only players getting reset)
  for(const u of list){
    if(B.over) return;
    if(u.hp<=0||u.acted||!B.units.includes(u)) continue;
    let act; try{ act=aiUnitAction(u); }catch(e){ console.error('AI error',e); act={type:'wait',unit:u}; }
    await executeAIAction(u,act);
    if(checkEnd()) return;
    await wait(90);
  }
  B.units.filter(u=>u.faction===faction).forEach(u=>u.acted=true);
}
async function executeAIAction(u,act){
  if(!act||act.type==='wait'){ u.acted=true; return; }
  R.focus(u.x,u.y); B.cursor={x:u.x,y:u.y}; refreshInfoCard();
  if(act.pos && (act.pos.x!==u.x||act.pos.y!==u.y)){
    const reach=reachable(u); const path=pathTo(reach,act.pos.x,act.pos.y);
    if(path){ await animateMovePath(u,path); u.x=act.pos.x; u.y=act.pos.y; u.rx=u.x; u.ry=u.y; }
  }
  if(act.type==='attack' && act.target && act.target.hp>0){
    if(act.weaponIdx!=null && u.items[act.weaponIdx] && !isStaff(u.items[act.weaponIdx])) u.equipIdx=act.weaponIdx;
    else equipForTarget(u,act.target,dist(u,act.target));
    await performAttack(u,act.target,dist(u,act.target));
  } else if(act.type==='heal' && act.target && act.target.hp>0){
    await performHeal(u,act.target,act.staff);
  }
  u.acted=true;
}
