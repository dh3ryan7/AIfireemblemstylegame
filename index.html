function classGlyphChar(s){ return {lord:'♛',sword:'⚔',lance:'🛡',axe:'🪓',bow:'🏹',mage:'✦',staff:'✚',horse:'🐴',armor:'🛡',peg:'🕊',thief:'🗡'}[s]||'•'; }
/* ============================ SECTION 10B — PREP / MANAGE / RESULTS / PANELS =========== */
function startPrep(idx){
  G.chapterIdx=idx; const ch=CHAPTERS[idx];
  (ch.joins||[]).forEach(id=>{ if(!G.roster.find(u=>u.templateId===id)){ const nu=recruitUnit(id); if(nu) G.roster.push(nu); } });
  if(G.casual && G._fallen){ G._fallen.forEach(u=>{ if(!G.roster.includes(u)){ u.hp=u.maxhp; u._fade=1; G.roster.push(u);} }); G._fallen=[]; }
  G.roster.forEach(u=>{ u.hp=u.maxhp; u.acted=false; u.statuses={}; u._fade=1; u._flash=0; u.ax=u.ay=0; if(u.ai)u.ai.provoked=false; });
  G._chapterSnapshot=serializeGame();
  const maxSlots=ch.deploy.tiles.length, forced=new Set(ch.forced||[]);
  const sel=new Set();
  G.roster.forEach(u=>{ if(forced.has(u.templateId)) sel.add(u.uid); });
  G.roster.forEach(u=>{ if(sel.size<maxSlots && !sel.has(u.uid)) sel.add(u.uid); });
  G._prep={idx,sel,maxSlots,forced};
  if(G.scene!=='world') openWorld();
  renderPrep();
}
function renderPrep(){
  const {sel,maxSlots,forced,idx}=G._prep; const ch=CHAPTERS[idx];
  const rows=G.roster.map(u=>{
    const on=sel.has(u.uid), lock=forced.has(u.templateId); const w=equippedWeapon(u);
    return `<div class="prow" data-uid="${u.uid}" data-focus tabindex="0" style="display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid ${on?'#3f7be0':'var(--line)'};border-radius:7px;margin-bottom:5px;cursor:pointer;${on?'background:rgba(78,160,255,.12)':''}">
      <span style="width:16px;text-align:center;color:${on?'#5fd86a':'#5b6783'}">${on?'✓':'○'}</span>
      <b style="flex:0 0 84px">${u.name}</b>
      <span style="color:var(--dim);flex:0 0 118px;font-size:12px">${classOf(u.cls).name} Lv${u.level}</span>
      <span style="color:var(--gold);flex:1;font-size:12px">${w?WEAPONS[w.id].name:(staffItems(u)[0]?WEAPONS[staffItems(u)[0].id].name:'—')}</span>
      ${lock?'<span class="badge" style="background:#3a4a66;color:#9fd0ff">LORD</span>':''}
      <button class="btn sm mng" data-uid="${u.uid}" style="padding:3px 8px">Items</button></div>`;
  }).join('');
  modalShow(`Prepare — ${ch.name}`,
    `<div style="color:var(--dim);margin-bottom:8px;font-size:12px">Objective: <b style="color:var(--ink)">${objLong(ch.objective)}</b> · Deploy up to <b style="color:var(--ink)">${maxSlots}</b> (selected ${sel.size})</div>${rows}`,
    [ {label:'Auto-Fill',act:()=>autoFillPrep()},
      {label:'Start Battle',gold:true,act:()=>commitPrep()},
      {label:'Back',act:()=>{ modalHide(); openWorld(); }} ]);
  $$('#mBody .prow').forEach(r=>{ r.onclick=(e)=>{ if(e.target.classList.contains('mng'))return; togglePrep(r.dataset.uid); }; });
  $$('#mBody .mng').forEach(b=>{ b.onclick=(e)=>{ e.stopPropagation(); openManage(G.roster.find(u=>u.uid==b.dataset.uid), renderPrep); }; });
}
function togglePrep(uid){ const {sel,maxSlots,forced}=G._prep; const u=G.roster.find(x=>x.uid==uid);
  if(forced.has(u.templateId)){ toast('The lord must deploy'); return; }
  if(sel.has(u.uid)) sel.delete(u.uid); else { if(sel.size>=maxSlots){ toast('No deployment slots left'); SFX.error(); return; } sel.add(u.uid); }
  SFX.cursor(); renderPrep();
}
function autoFillPrep(){ const {sel,maxSlots,forced}=G._prep; sel.clear(); G.roster.forEach(u=>{if(forced.has(u.templateId))sel.add(u.uid);}); G.roster.forEach(u=>{if(sel.size<maxSlots)sel.add(u.uid);}); SFX.select(); renderPrep(); }
function commitPrep(){
  const {sel,idx,forced}=G._prep; const ch=CHAPTERS[idx];
  let deployed=G.roster.filter(u=>sel.has(u.uid));
  deployed.sort((a,b)=>(forced.has(b.templateId)?1:0)-(forced.has(a.templateId)?1:0));
  if(!deployed.length){ toast('Deploy at least one unit'); return; }
  modalHide(); $('#world').style.display='none';
  runDialogue(ch.pre||[], ()=>buildBattle(ch, deployed));
}
/* ---- inventory management ---- */
function itemRow(u,it,i,where){
  const isW=isWeaponItem(it); const name=isW?WEAPONS[it.id].name:ITEMS[it.id].name;
  const uses=isW?(it.uses<99?` (${it.uses})`:''):(it.uses>1?` (${it.uses})`:'');
  let btns='';
  if(where==='unit'){
    if(isW&&!isStaff(it)&&canUse(u,it)) btns+=`<button class="btn sm" data-act="equip" data-idx="${i}" style="padding:2px 6px">${u.equipIdx===i?'▸eq':'Equip'}</button>`;
    if(!isW&&['boost','promo','heal'].includes(ITEMS[it.id].kind)) btns+=`<button class="btn sm" data-act="use" data-idx="${i}" style="padding:2px 6px">Use</button>`;
    btns+=`<button class="btn sm" data-act="store" data-idx="${i}" style="padding:2px 6px">▸Cv</button>`;
  } else btns+=`<button class="btn sm" data-act="take" data-idx="${i}" style="padding:2px 6px">Take</button>`;
  const dim=isW&&!isStaff(it)&&where==='unit'&&!canUse(u,it);
  return `<div style="display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid #20293f${dim?';opacity:.5':''}"><span style="flex:1;font-size:12px">${name}${uses}</span>${btns}</div>`;
}
function openManage(u,onClose){
  const build=()=>{
    const ui=u.items.map((it,i)=>itemRow(u,it,i,'unit')).join('');
    const cv=G.convoy.map((it,i)=>itemRow(u,it,i,'convoy')).join('');
    const promo=canPromote(u)?`<div style="margin-top:8px;color:#f2c14e;font-size:12px">★ Eligible to promote — Use a matching seal from the convoy.</div>`:'';
    return `<div style="display:flex;gap:14px">
      <div style="flex:1"><div style="color:var(--dim);font-size:11px;margin-bottom:3px">${u.name} — ${classOf(u.cls).name} Lv${u.level} · HP${u.maxhp} (carry max 6)</div>${ui||'<div style="color:#5b6783">empty</div>'}</div>
      <div style="flex:1"><div style="color:var(--dim);font-size:11px;margin-bottom:3px">CONVOY (${G.convoy.length})</div><div style="max-height:230px;overflow:auto">${cv||'<div style="color:#5b6783">empty</div>'}</div></div></div>${promo}`;
  };
  const render=()=>{ modalShow('Manage — '+u.name, build(), [{label:'Done',gold:true,act:()=>{ modalHide(); onClose&&onClose(); }}]);
    $$('#mBody [data-act]').forEach(b=>b.onclick=()=>{ manageAction(u,b.dataset.act,+b.dataset.idx); render(); }); };
  render();
}
function manageAction(u,act,idx){
  if(act==='equip'){ equipItem(u,u.items[idx]); }
  else if(act==='store'){ const it=u.items[idx]; G.convoy.push(it); u.items.splice(idx,1); equipBest(u); }
  else if(act==='take'){ if(u.items.length>=6){ toast('Inventory full'); return; } const it=G.convoy[idx]; u.items.push(it); G.convoy.splice(idx,1); equipBest(u); }
  else if(act==='use'){ const it=u.items[idx], def=ITEMS[it.id];
    if(def.kind==='boost'){ applyBoost(u,def); it.uses--; SFX.levelup(); toast(u.name+' '+def.desc,'good'); }
    else if(def.kind==='heal'){ u.hp=clamp(u.hp+(def.amount>=999?u.maxhp:def.amount),0,u.maxhp); it.uses--; }
    else if(def.kind==='promo'){ if(canPromote(u)&&promoMatches(u,it)){ modalHide(); startPromotion(u,it,()=>{ openManage(u); }); return; } else { toast('Cannot promote this unit'); return; } }
    if(it.uses<=0) u.items.splice(u.items.indexOf(it),1); }
  SFX.select();
}
function openArmyManage(){

  const srow=s=>{
    const v=(s==='hp'?u.maxhp:getStat(u,s)), mx=statCapOf(u,s), boosted=s!=='hp'&&u.statuses&&u.statuses[s];

    const x=u.wexp[t]||0, r=rankFromExp(x), nxt=RANKS[RANKS.indexOf(r)+1];

  }).join('') : '<div class="cx-note" style="margin-top:2px">empty</div>';

    || '<div class="cx-note" style="margin-top:2px">none</div>';
  const sups=(u.supports||[]).map(s=>{
    const p=cxFindUnit(s.with), nm=p?p.name:(ROSTER[s.partnerId]?ROSTER[s.partnerId].name:cap(s.partnerId||'?'));
    const rk=s.rank||0, next=rk>=3?null:CX_SUPPT[rk];
    return `<div class="cx-irow"><span style="flex:1">${nm}</span><b style="color:${rk?'var(--gold)':'var(--dim)'}">${CX_RANKL[rk]}</b><span class="cx-use">${next!=null?(s.points||0)+'/'+next+' pts':'MAX'}</span></div>`;

  modalShow(`Unit Report — ${u.name}`,`
    <div class="cx-hd">
      <div class="cx-port" style="background:${fc.fill2};border-color:${fc.ring}">${classGlyphChar(c.sprite)}</div>

        <div class="cx-sub">${c.name} · Lv ${u.level} · ${CX_MOVE[c.move]||cap(c.move)} · MOV ${getStat(u,'mov')} · CON ${getStat(u,'con')}</div></div>

    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      ${cxBar(u.hp,u.maxhp,hpCol)}
      ${showGrow?`<span class="cx-use" style="flex:0 0 auto">EXP ${u.exp}/100</span>${cxBar(u.exp,100,'var(--gold)')}`:''}
    </div>

let SUPPORT_CONVOS={};   // assigned by content

function serializeGame(){
  return JSON.parse(JSON.stringify({ v:1, difficulty:G.difficulty, casual:G.casual, chapterIdx:G.chapterIdx,
    completed:G.completed, deaths:G.deaths, convoy:G.convoy, roster:G.roster, uidCounter:_uid,
    showThreatDefault:!!G.showThreatDefault }));
}
function loadFromObject(o,silent){
  if(!o) return false;
  G.difficulty=o.difficulty||'normal'; G.casual=!!o.casual; G.chapterIdx=o.chapterIdx||0;
  G.completed=o.completed||[]; G.deaths=o.deaths||[]; G.showThreatDefault=!!o.showThreatDefault;
  G.convoy=(o.convoy||[]).map(x=>Object.assign({},x));
  G.roster=(o.roster||[]).map(x=>JSON.parse(JSON.stringify(x)));
  _uid=Math.max(o.uidCounter||1, ...(G.roster.map(u=>u.uid+1).concat(1)));
  G._fallen=[];
  if(!silent){ B=null; openWorld(); }
  return true;
}
function serializeFull(){
  const game=serializeGame(); let battle=null;
  if(B && !B.over){ battle={ chapterIdx:B.chapter.idx, w:B.w,h:B.h, map:B.map.slice(), turn:B.turn, turnCount:B.turnCount,
    objective:B.objective, reinfDone:B.reinfDone, recruited:B.recruitedThisChapter, showThreat:B.showThreat, cursor:B.cursor,
    players:B.units.filter(u=>u.faction==='player').map(u=>u.uid),
    others:B.units.filter(u=>u.faction!=='player').map(u=>JSON.parse(JSON.stringify(u))) }; }
  return {v:1, game, battle};
}
function loadFull(o){
  if(!o||!o.game){ toast('Invalid save','warn'); return; }
  loadFromObject(o.game,true);
  if(o.battle && CHAPTERS[o.battle.chapterIdx]){
    const bt=o.battle, ch=CHAPTERS[bt.chapterIdx]; R.reset();
    B={ chapter:ch, w:bt.w,h:bt.h, map:bt.map.slice(), units:[], turn:'player', turnCount:bt.turnCount, state:'free',
        cursor:bt.cursor||{x:0,y:0}, sel:null, reach:null, overlay:{}, objective:bt.objective, over:false, win:false,
        reinfDone:bt.reinfDone||{}, recruitedThisChapter:bt.recruited||[], showThreat:!!bt.showThreat, hideCursor:false };
    bt.players.forEach(uid=>{ const u=G.roster.find(r=>r.uid===uid); if(u){ u.rx=u.x;u.ry=u.y;u._fade=1;u._flash=0;u.ax=u.ay=0; B.units.push(u);} });
    bt.others.forEach(c=>{ c.rx=c.x;c.ry=c.y;c._fade=1;c._flash=0;c.ax=c.ay=0; if(c.ai&&c.ai.provoked==null)c.ai.provoked=false; B.units.push(c); });
    G.scene='battle'; $('#world').style.display='none'; hide('#title'); show('#topbar'); R.focus(B.cursor.x,B.cursor.y,true);
    G._chapterSnapshot=G._chapterSnapshot||serializeGame();
    updateHUD(); beginPlayerPhase(false); toast('Battle resumed at your phase','good');
  } else { openWorld(); }
}
function stamp(){ const d=new Date(); const p=n=>('0'+n).slice(-2); return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes()); }

/* ---- 60fps loop ---- */
let _last=0;
function loop(t){ const dt=Math.min(48,(t-_last)||16); _last=t;
  try{
    R.step(dt);
    if(typeof PROMO!=='undefined'&&PROMO.active){ PROMO.update(dt); PROMO.draw(); }
    else if(BA.active){ BA.update(dt); BA.draw(); }
    else if(G.scene==='battle'&&B) R.draw();
    else { ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,cv.width,cv.height); }
  }catch(e){ // a bad frame must NEVER kill the rAF chain (that would freeze all animation permanently)
    console.error('[TF] frame error (recovered):',e);
    try{ ctx.setTransform(1,0,0,1,0,0); }catch(_){}
  }
  requestAnimationFrame(loop); }

/* ============================ SECTION 11.5 — FE-STYLE BATTLE SCENE ===================== */
const BA={
  active:false, L:null, R:null, terrain:null, fx:[], shakeT:0, shakeMag:0,
  flash:0, flashCol:'#fff', zoom:1, zoomTgt:1, zoomCx:480, zoomCy:300, vignette:0, fadeIn:0, fadeOut:0, pal:null,
  bossName:null, bossBanner:0, classBody:{},
  /* ---- orchestration ---- */
  async play(att,def,log,aStart,dStart,fcPre){
    MUSIC.play((att.isBoss||def.isBoss)?'boss':'battle');
    this.setup(att,def,aStart,dStart,fcPre);
    this.active=true; B.hideCursor=true; hide('#topbar'); hide('#infocard'); hide('#roster'); hide('#combatlog'); hideAllPanels();
    this.fx.length=0; this.shakeT=0; this.flash=0; this.zoom=this.zoomTgt=1; this.vignette=0; this.fadeOut=0; this.bossBanner=0; this.bossName=null; this.letterbox=0; R.freeze=0;
    await this.intro();
    const boss=[att,def].find(u=>u.isBoss);
    if(boss && !boss._introShown){ boss._introShown=true; await this.bossIntro(boss); }
    for(const ev of log){ await this.strike(ev); if(this.L.hp<=0||this.R.hp<=0) break; }
    await this.outro();
    [att,def].forEach(u=>{ if(u.hp<=0){ u._fade=0; u._dying=true; } u.ax=0; u.ay=0; });
    this.active=false; show('#topbar'); if(B&&B.logOpen) show('#combatlog'); renderRoster();
    MUSIC.play(B.turn==='player'?'map':'enemy');
  },
  setup(att,def,aStart,dStart,fcPre){
    const leftU=(att.faction==='enemy')?def:att, rightU=(leftU===att)?def:att;
    const lHp=(leftU===att)?aStart:dStart, rHp=(rightU===att)?aStart:dStart;
    this.terrain=terrainAt(mapChar(def.x,def.y)); this.pal=this.palette(this.terrain);
    this.L=this.mkFighter(leftU,300,418,+1,lHp);
    this.R=this.mkFighter(rightU,660,418,-1,rHp);
    this.L.fc=fcPre?((leftU===att)?fcPre.a:fcPre.counter):null;   // attacker side: fcPre.a; defender side: counter (null = can't reply)
    this.R.fc=fcPre?((rightU===att)?fcPre.a:fcPre.counter):null;
    this.L.terr=terrainAt(mapChar(leftU.x,leftU.y)); this.R.terr=terrainAt(mapChar(rightU.x,rightU.y));
  },
  bossIntro(boss){
    return new Promise(res=>{
      this.bossName=boss.name||'Commander'; SFX.boss(); this.vignette=Math.max(this.vignette,0.7);
      R.tween(1150,k=>{ this.bossBanner=k; this.vignette=Math.max(this.vignette,(k<0.5?0.7:0.7*(1-(k-0.5)/0.5))); })
       .then(()=>{ this.bossBanner=0; this.bossName=null; res(); });
    });
  },
  mkFighter(u,x,y,side,hp){
    const port=u.port||(ROSTER[u.templateId]&&ROSTER[u.templateId].port)||{skin:'#e8b890',hair:'#5a3a2a',cloth:FCOL[u.faction].badge,accent:FCOL[u.faction].ring,hat:'hair'};
    return {unit:u,x,y,bx:x,side,hp,hpMax:u.maxhp,hpGhost:hp,lunge:0,arm:0,lean:0,hop:0,crouch:0,knock:0,flash:0,alpha:1,deathRot:0,
            draw:0,castGlow:0,thrustMode:false,bowMode:false,trailPts:[],trailCol:'#dfeaff',_tip:null,_melee:false,port};
  },
  shake(m,d){ this.shakeMag=Math.max(this.shakeMag,m); this.shakeT=Math.max(this.shakeT,d); },
  zoomTo(cx,cy,z,dur){ this.zoomCx=cx; this.zoomCy=cy; this.zoomTgt=z; R.tween(dur||300,k=>{},ease.out).then(()=>{ this.zoomTgt=1; }); },
  /* ---- timeline ---- */
  async intro(){
    this.fadeIn=1; this.zoom=this.zoomTgt=1.12; this.zoomCx=480; this.zoomCy=330;   // camera push-in on engage
    await R.tween(300,k=>{ const e=ease.out(k); this.fadeIn=1-e; this.L.lunge=lerp(-50,0,e); this.R.lunge=lerp(50,0,e); const z=lerp(1.12,1.0,e); this.zoom=z; this.zoomTgt=z; });
    this.zoom=this.zoomTgt=1; this.zoomCx=480; this.zoomCy=300; this.L.lunge=this.R.lunge=0; await wait(70);
  },
  async strike(ev){
    if(this.L.hp<=0||this.R.hp<=0) return;
    const striker=(ev.attacker===this.L.unit)?this.L:this.R, target=(striker===this.L)?this.R:this.L;
    const dir=striker.side, wt=ev.wtype, cls=classOf(striker.unit.cls);
    if(ev.crit) this.flashCol='#fff';
    striker.busy=true;
    if(ev.crit) await this.critCutIn(striker);
    if(wt==='bow') await this.bowShot(ev,striker,target,dir);
    else if(isMagic(wt)) await this.castSpell(ev,striker,target,dir);
    else if(wt==='lance'){ striker.thrustMode=true; await this.thrust(ev,striker,target,dir, cls.move==='horse'); striker.thrustMode=false; }
    else await this.meleeSwing(ev,striker,target,dir, wt==='axe', cls);
    striker.lunge=striker.lean=striker.arm=striker.crouch=0; striker.busy=false;
    await wait(ev.killed?40:100);
  },
  async meleeSwing(ev,striker,target,dir,axe,cls){
    striker.trailCol=axe?'#ffdcb0':'#e6f2ff';
    const flourish = ev.crit || (cls.crit>=15);   // myrmidons/swordmasters & crits show a multi-slash flourish
    await R.tween(axe?(ev.crit?320:230):(ev.crit?210:150),k=>{ striker.arm=lerp(0,-1,ease.out(k)); striker.lean=(axe?-0.09:-0.05)*k; striker.lunge=dir*(-9)*k; striker.crouch=axe?-k*4:0; });
    SFX.whoosh(axe);
    await R.tween(axe?(ev.crit?150:120):(ev.crit?120:78),k=>{ striker.lunge=dir*lerp(-9,axe?80:72,ease.in(k)); striker.arm=lerp(-1,-0.2,k); });
    await R.tween(axe?90:(ev.crit?86:58),k=>{ striker.arm=lerp(-0.2,1,k); });
    this.impact(ev,striker,target,dir);
    if(flourish && !ev.miss){
      for(let s=0;s<(ev.crit?2:1);s++){ await wait(55); SFX.whoosh(false);
        await R.tween(58,k=>{ striker.arm=lerp(1,0.2,k); }); await R.tween(66,k=>{ striker.arm=lerp(0.2,1,k); });
        this.slashFx(target,dir,ev.crit); this.burst(target,ev.crit?'#ffe08a':'#dff0ff',ev.crit?10:6); this.shake(ev.crit?7:3,150); }
    }
    await R.tween(ev.crit?260:200,k=>{ striker.lunge=dir*lerp(axe?80:72,0,ease.out(k)); striker.arm=lerp(1,0,k); striker.lean*=(1-k); striker.crouch*=(1-k); });
  },
  async thrust(ev,striker,target,dir,charge){
    striker.trailCol='#dfe8ff'; const reach=charge?112:88;
    await R.tween(ev.crit?200:140,k=>{ striker.arm=lerp(0,-0.28,k); striker.lunge=dir*(-12)*k; striker.lean=-0.03*k; });
    SFX.whoosh(false);
    await R.tween(ev.crit?130:86,k=>{ striker.lunge=dir*lerp(-12,reach,ease.in(k)); striker.arm=lerp(-0.28,-0.04,k); });
    this.impact(ev,striker,target,dir);
    await R.tween(ev.crit?260:200,k=>{ striker.lunge=dir*lerp(reach,0,ease.out(k)); striker.arm=lerp(-0.04,0,k); striker.lean*=(1-k); });
  },
  async bowShot(ev,striker,target,dir){
    striker.bowMode=true; SFX.bowDraw();
    await R.tween(280,k=>{ striker.arm=lerp(0,-0.32,ease.out(k)); striker.draw=ease.out(k); });
    await wait(60); SFX.bowRelease(); striker.draw=0;
    await this.fire(ev,striker,target,dir);
    this.impact(ev,striker,target,dir);
    await R.tween(230,k=>{ striker.arm=lerp(-0.32,0,k); });
    striker.bowMode=false;
  },
  async castSpell(ev,striker,target,dir){
    SFX.spellCharge(); striker.castGlow=0;
    await R.tween(360,k=>{ striker.arm=lerp(0,-0.7,ease.out(k)); striker.castGlow=ease.out(k); striker.lean=-0.03*k; });
    await wait(50);
    await R.tween(130,k=>{ striker.arm=lerp(-0.7,-0.15,k); });   // thrust hands forward to release
    await this.castEffect(ev,striker,target,dir);
    this.impact(ev,striker,target,dir);
    await R.tween(240,k=>{ striker.arm=lerp(-0.15,0,k); striker.castGlow*=(1-k); striker.lean*=(1-k); });
    striker.castGlow=0;
  },
  castEffect(ev,striker,target,dir){
    return new Promise(res=>{
      const wid=ev.wid||'', tx=target.x, ty=target.y-72;
      if(ev.wtype==='light'){ SFX.lightCast(); this.fx.push({type:'pillar',x:tx,y:ty,t:0,dur:260,col:'#ffe79a',onArrive:res}); }
      else if(ev.wtype==='dark'){ SFX.darkCast(); this.fx.push({type:'vortex',x:tx,y:ty,t:0,dur:300,col:'#b07cff',onArrive:res}); }
      else if(wid==='thunder'){ SFX.thunderCast(); this.fx.push({type:'bolt',x:tx,y0:-30,y1:ty,t:0,dur:150,col:'#cfeaff',onArrive:res}); }
      else { SFX.fireCast(); const sx=striker.x+dir*30, sy=striker.y-82;   // fire / elfire / default anima: flying fireball -> burst
        this.fx.push({type:'fireball',x:sx,y:sy,sx,sy,tx,ty,t:0,dur:230,col:'#ff9d3b',onArrive:()=>{ this.fx.push({type:'flame',x:tx,y:ty,t:0,dur:360,col:'#ff9d3b'}); res(); }}); }
    });
  },
  burst(target,col,n){ for(let i=0;i<n;i++) this.fx.push({type:'spark',x:target.x,y:target.y-72,vx:(Math.random()*2-1)*4,vy:-Math.random()*5-1,col,t:0,dur:340+Math.random()*240}); },
  fire(ev,striker,target,dir){
    return new Promise(res=>{
      const sx=striker.x+dir*34, sy=striker.y-78, tx=target.x, ty=target.y-72;
      const magic=isMagic(ev.wtype);
      const col=ev.wtype==='anima'?'#ff9d3b':ev.wtype==='light'?'#ffe79a':ev.wtype==='dark'?'#b07cff':'#d8d8d8';
      if(magic) SFX.talk();
      this.fx.push({type:magic?'orb':'arrow',x:sx,y:sy,sx,sy,tx,ty,t:0,dur:magic?260:200,col,dir,arrived:false,onArrive:res});
    });
  },
  impact(ev,striker,target,dir){
    if(ev.miss){ SFX.miss();
      this.fx.push({type:'dmg',x:target.x,y:target.y-118,text:'Miss',col:'#dbe3f0',size:30,t:0,dur:760,vy:-0.35});
      R.tween(300,k=>{ const s=Math.sin(k*Math.PI); target.hop=s*26; target.lunge=-dir*s*22; }).then(()=>{ target.hop=0; target.lunge=0; });
      return; }
    const magic=isMagic(ev.wtype), ix=target.x, iy=target.y-72;
    target.flash=1; R.tween(260,k=>{ target.flash=1-k; });
    R.freeze=ev.crit?190:70;                                   // hit-stop (longer on crit)
    this.shake(ev.crit?22:6, ev.crit?520:210);
    if(!magic) this.slashFx(target,dir,ev.crit);
    if(ev.crit){ this.flash=0.92; this.vignette=1; SFX.crit(); this.zoomTo((striker.x*2+ix)/3, iy-8, 1.7, 460); this.speedLines(ix,iy); this.addCritImpactFx(ix,iy,target); }
    else if(!magic) SFX.hit();
    const sparkCol=ev.crit?'#ffe08a':(ev.eff?'#ff9d3b':'#ffd0c0');
    if(!magic||ev.crit) for(let i=0;i<(ev.crit?28:11);i++) this.fx.push({type:'spark',x:ix,y:iy,vx:(Math.random()*2-1)*(ev.crit?6.5:3.4),vy:-Math.random()*(ev.crit?7.5:4.4)-1,col:sparkCol,t:0,dur:380+Math.random()*340});
    // knockback
    const kb=ev.crit?20:9; R.tween(190,k=>{ target.knock=striker.side*kb*(1-ease.out(k)); }).then(()=>target.knock=0);
    this.fx.push({type:'dmg',x:target.x,y:target.y-122,text:String(ev.dmg),col:ev.crit?'#ff5d54':'#ffffff',size:ev.crit?58:40,t:0,dur:820,vy:-0.5,pop:ev.crit});
    if(ev.eff) this.fx.push({type:'dmg',x:target.x,y:target.y-160,text:'EFFECTIVE',col:'#ff9d3b',size:17,t:0,dur:860,vy:-0.28});
    ev.procs.forEach((p,i)=> this.fx.push({type:'dmg',x:striker.x,y:striker.y-128-i*20,text:p,col:'#c8a8ff',size:17,t:0,dur:940,vy:-0.28}));
    // HP drain with a lagging ghost
    const b=target.hp, a=Math.max(0,target.hp-ev.dmg);
    R.tween(ev.crit?520:320,k=>{ target.hp=Math.round(lerp(b,a,ease.out(k))); });
    R.tween(ev.crit?900:680,k=>{ target.hpGhost=lerp(b,a,ease.in(k)); });
    if(ev.heal>0){ const hb=striker.hp,ha=Math.min(striker.hpMax,striker.hp+ev.heal); R.tween(360,k=>{ striker.hp=Math.round(lerp(hb,ha,k)); striker.hpGhost=striker.hp; });
      this.fx.push({type:'dmg',x:striker.x,y:striker.y-120,text:'+'+ev.heal,col:'#5fd86a',size:24,t:0,dur:780,vy:-0.4}); }
  },
  slashFx(target,dir,big){ this.fx.push({type:'slash',x:target.x-dir*8,y:target.y-72,dir,big,t:0,dur:big?300:200}); },
  speedLines(cx,cy){ for(let i=0;i<14;i++){ const a=Math.random()*6.28,r=120+Math.random()*120; this.fx.push({type:'speed',x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,ang:a,len:50+Math.random()*40,t:0,dur:260}); } },
  async outro(){
    const dead=[this.L,this.R].filter(f=>f.hp<=0);
    if(dead.length){ await wait(120);
      for(const f of dead){ SFX.death(); f.flash=1; this.flash=Math.max(this.flash,0.5); this.shake(8,300);
        for(let i=0;i<24;i++) this.fx.push({type:'spark',x:f.x,y:f.y-60,vx:(Math.random()*2-1)*5,vy:-Math.random()*6-1,col:'#ffffff',t:0,dur:500+Math.random()*300});
        R.tween(220,k=>{ f.flash=1-k; });
        R.tween(640,k=>{ f.alpha=1-ease.in(k); f.deathRot=ease.out(k)*0.6*f.side; f.crouch=-k*8; f.lean=k*0.5*f.side; f.knock=f.side*k*30; }); }
      await wait(700);
    } else await wait(150);
    await R.tween(240,k=>{ this.fadeOut=ease.in(k); });
  },
  /* ---- per-frame update ---- */
  update(dt){
    if(R.freeze>0){ if(this.shakeT>0) this.shakeT-=dt; return; }   // hold the frame during hit-stop (still rumble)
    if(this.shakeT>0) this.shakeT-=dt;
    if(this.flash>0) this.flash=Math.max(0,this.flash-dt/360);
    if(this.vignette>0) this.vignette=Math.max(0,this.vignette-dt/600);
    this.zoom+=(this.zoomTgt-this.zoom)*Math.min(1,dt/90);
    for(const f of [this.L,this.R]){ if(f&&f.trailPts){ for(const p of f.trailPts) p.life-=dt; if(f.trailPts.some(p=>p.life<=0)) f.trailPts=f.trailPts.filter(p=>p.life>0); } }
    for(let i=this.fx.length-1;i>=0;i--){ const f=this.fx[i]; f.t+=dt; const k=clamp(f.t/f.dur,0,1);
      if(f.type==='spark'){ f.x+=f.vx; f.y+=f.vy; f.vy+=0.22; }
      else if(f.type==='arrow'){ f.x=lerp(f.sx,f.tx,k); f.y=lerp(f.sy,f.ty,k)-Math.sin(k*Math.PI)*16; if(k>=1&&!f.arrived){ f.arrived=true; if(f.onArrive)f.onArrive(); } }
      else if(f.type==='fireball'){ f.x=lerp(f.sx,f.tx,k); f.y=lerp(f.sy,f.ty,k); if((f.t%36)<dt) this.fx.push({type:'spark',x:f.x,y:f.y,vx:0,vy:0,col:'#ffcaa0',t:0,dur:220}); if(k>=1&&!f.arrived){ f.arrived=true; if(f.onArrive)f.onArrive(); } }
      else if((f.type==='bolt'||f.type==='pillar'||f.type==='vortex') && !f.arrived && f.t>=f.dur*0.4){ f.arrived=true; if(f.onArrive)f.onArrive(); }
      if((f.type==='arrow'||f.type==='fireball')){ if(f.arrived) this.fx.splice(i,1); }
      else if(f.t>=f.dur) this.fx.splice(i,1);
    }
  },
  /* ---- draw ---- */
  draw(){
    ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,960,600);
    let sx=0,sy=0; if(this.shakeT>0){ const m=this.shakeMag*(this.shakeT/440); sx=(Math.random()*2-1)*m; sy=(Math.random()*2-1)*m; }
    ctx.save();
    ctx.translate(this.zoomCx,this.zoomCy); ctx.scale(this.zoom,this.zoom); ctx.translate(-this.zoomCx,-this.zoomCy); ctx.translate(sx,sy);
    this.drawBG();
    this.drawFighter(this.R); this.drawFighter(this.L);
    this.drawTrails();
    this.drawFx();
    ctx.restore();
    if(this.vignette>0){ const g=ctx.createRadialGradient(480,300,180,480,300,560); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(120,0,0,'+(0.5*this.vignette)+')'); ctx.fillStyle=g; ctx.fillRect(0,0,960,600); }
    if(this.flash>0){ ctx.fillStyle=this.flashCol; ctx.globalAlpha=this.flash; ctx.fillRect(0,0,960,600); ctx.globalAlpha=1; }
    if(this.letterbox>0){ const bh=48*this.letterbox; ctx.fillStyle='#000'; ctx.fillRect(0,0,960,bh); ctx.fillRect(0,600-bh,960,bh); }
    this.drawPanels();
    if(this.bossName) this.drawBossBanner();
    if(this.fadeIn>0){ ctx.fillStyle='#05070c'; ctx.globalAlpha=this.fadeIn; ctx.fillRect(0,0,960,600); ctx.globalAlpha=1; }
    if(this.fadeOut>0){ ctx.fillStyle='#05070c'; ctx.globalAlpha=this.fadeOut; ctx.fillRect(0,0,960,600); ctx.globalAlpha=1; }
  },
  drawBossBanner(){
    const p=this.bossBanner;
    let slide=0; if(p<0.16) slide=-1+ease.out(p/0.16); else if(p>0.84) slide=ease.in((p-0.84)/0.16);
    const cx=480+slide*1100, by=246, bh=82;
    const g=ctx.createLinearGradient(0,by,0,by+bh); g.addColorStop(0,'rgba(90,10,12,0)'); g.addColorStop(0.5,'rgba(120,16,18,.92)'); g.addColorStop(1,'rgba(60,6,8,0)');
    ctx.fillStyle=g; ctx.fillRect(0,by,960,bh);
    ctx.strokeStyle='rgba(255,90,80,.55)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,by+7); ctx.lineTo(960,by+7); ctx.moveTo(0,by+bh-7); ctx.lineTo(960,by+bh-7); ctx.stroke();
    ctx.save(); ctx.translate(cx,by+bh/2); ctx.textAlign='center';
    ctx.font='900 46px Segoe UI'; ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.7)'; ctx.strokeText((this.bossName||'').toUpperCase(),0,4);
    ctx.fillStyle='#ffe0dc'; ctx.fillText((this.bossName||'').toUpperCase(),0,4);
    ctx.font='bold 13px Segoe UI'; ctx.fillStyle='#ff8a82'; ctx.fillText('— ENEMY COMMANDER —',0,30);
    ctx.restore();
  },
  palette(t){
    const n=t?t.name:'Plain';
    if(n==='Forest') return {sky0:'#2a3a4a',sky1:'#3a5a44',hillFar:'#27402f',hillNear:'#1d3324',ground:'#26421f',ground2:'#1c3318',motif:'forest'};
    if(n==='Fort'||n==='Gate'||n==='Throne') return {sky0:'#3a3550',sky1:'#5a4f66',hillFar:'#3a3648',hillNear:'#2b2838',ground:'#43404e',ground2:'#34313c',motif:'fort'};
    if(n==='Water'||n==='Bridge') return {sky0:'#27405e',sky1:'#3f6f9a',hillFar:'#2a4a6a',hillNear:'#1f3a55',ground:'#2e5c86',ground2:'#264e72',motif:'water'};

  /* ---- fighter ---- */
  drawFighter(f){

    let mountDY=0;

       - origin = ground under the fighter's feet, +x = facing direction (flip handled outside)
       - draw the FULL body (lower body, torso, head, headgear, class details) spanning y∈[-120,0]

      if(ac.state!=='running'){ api.resume(); return; } // remembered; starts once the context unlocks
      if(cur===name&&voices)return; // already playing that track
      startTrack(name); },
    stop(fade){ want=null; cur=null; voices=null;
      if(timer){ clearInterval(timer); timer=null; }
      if(ac&&bus){ fadeBus(bus,Math.max(0.02,fade||0.25)); bus=null; } },
    resume(){ if(!on||!want)return; ensure(); if(!ac)return;
      if(ac.state==='suspended') ac.resume().then(()=>{ if(on&&want&&ac.state==='running'&&(cur!==want||!voices))startTrack(want); }).catch(()=>{});
      else if(cur!==want||!voices) startTrack(want); },
    setOn(v){ v=!!v; if(v===on)return; on=v; save();

  window.addEventListener('keydown',()=>api.resume());
  return api;
})();

/* ---- battle-panel HIT/DMG/CRT strip (f.fc attached in BA.setup; null = side cannot counter) ---- */
function baPanelStats(f,x,y,w,h){
  const fc=f.fc||null, by=y+h-12;
  ctx.strokeStyle='rgba(154,167,189,.22)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x+14,y+h-30); ctx.lineTo(x+w-14,y+h-30); ctx.stroke();
  ctx.textAlign='left';
  const col=(cx,lbl,val,x2)=>{
    ctx.fillStyle='#9aa7bd'; ctx.font='bold 10px Segoe UI'; ctx.fillText(lbl,cx,by);
    ctx.fillStyle=fc?'#fff':'#5b6783'; ctx.font='bold 15px Segoe UI'; ctx.fillText(val,cx+32,by+1);
    if(x2){ const vw=ctx.measureText(val).width; ctx.fillStyle='#ff9d3b'; ctx.font='bold 11px Segoe UI'; ctx.fillText('×2',cx+35+vw,by); }
  };
  col(x+18,'HIT', fc?fc.hit+'%':'—');
  col(x+114,'DMG', fc?String(fc.dmg):'—', fc&&fc.doubles);
  col(x+210,'CRT', fc?fc.crit+'%':'—');
  if(fc){ // matchup cues: weapon-triangle arrow after DMG(×2); effective / hot-crit / sure-hit tinting
    ctx.font='bold 15px Segoe UI'; let ox=x+114+35+ctx.measureText(String(fc.dmg)).width;
    if(fc.doubles){ ctx.font='bold 11px Segoe UI'; ox+=ctx.measureText('×2').width+3; }
    if(fc.tri>0){ ctx.fillStyle='#5fd86a'; ctx.font='bold 12px Segoe UI'; ctx.fillText('▲',ox,by); }
    else if(fc.tri<0){ ctx.fillStyle='#ff6b6b'; ctx.font='bold 12px Segoe UI'; ctx.fillText('▼',ox,by); }
    if(fc.eff){ ctx.fillStyle='#ff9d3b'; ctx.font='bold 15px Segoe UI'; ctx.fillText(String(fc.dmg),x+114+32,by+1); }
    if(fc.crit>=20){ ctx.fillStyle='#ff8a82'; ctx.font='bold 15px Segoe UI'; ctx.fillText(fc.crit+'%',x+210+32,by+1); }
    if(fc.hit>=90){ ctx.fillStyle='#8ee08a'; ctx.font='bold 15px Segoe UI'; ctx.fillText(fc.hit+'%',x+18+32,by+1); }
  }
}

/* ---- combat log (B.combatLog init'd in buildBattle; helpers are defensive for restored battles) ---- */
function clName(u){ return '<span style="color:'+(FCOL[u.faction]||FCOL.player).fill+';font-weight:700">'+u.name+'</span>'; }
function logLine(html,cls){
  if(!B) return;
  if(!B.combatLog) B.combatLog=[];
  B.combatLog.push('<div class="'+(cls||'cl-line')+'">'+html+'</div>');
  if(B.combatLog.length>100) B.combatLog.splice(0,B.combatLog.length-100);
  const n=$('#combatlog'); if(n&&!n.classList.contains('hidden')) renderCombatLog();
}
function logTurnHeader(phase){ logLine('— Turn '+B.turnCount+': '+phase+' —','cl-turn'); }
function logCombatEvents(log){
  for(const ev of log){
    const procs=(ev.procs&&ev.procs.length)?' <span style="color:var(--purple)">'+ev.procs.join(' · ')+'</span>':'';
    const head=clName(ev.attacker)+' → '+clName(ev.defender)+': ';
    let s;
    if(ev.miss) s=head+'<span style="color:var(--dim)">MISS</span>';
    else if(ev.crit) s=head+'<span style="color:var(--gold);font-weight:800">CRIT '+ev.dmg+'!</span>';
    else s=head+'<b>'+ev.dmg+'</b> dmg';
    if(ev.heal>0) s+=' <span style="color:var(--green)">+'+ev.heal+'</span>';
    logLine(s+procs);
    if(ev.killed) logLine('<span style="color:var(--red)">☠ '+ev.defender.name+' falls</span>');
  }
}
function renderCombatLog(){
  const n=$('#combatlog'); if(!n) return;
  const L=(B&&B.combatLog)||[];
  n.innerHTML=L.length?L.join(''):'<div class="cl-line" style="color:#5b6783">No combat yet.</div>';
  n.scrollTop=n.scrollHeight;
}
function toggleCombatLog(force){
  const n=$('#combatlog'); if(!n) return;
  const on=(force!=null)?force:n.classList.contains('hidden');
  if(B) B.logOpen=on;
  if(on){ show('#combatlog'); renderCombatLog(); } else hide('#combatlog');
}

/* ---- persistent enemy range pins (T / click enemy) ---- */
function togglePin(u){
  if(u.faction!=='enemy'||u.hp<=0) return false;
  if(!B.pinned) B.pinned=new Set();
  if(B.pinned.has(u.uid)){ B.pinned.delete(u.uid); toast(u.name+' range unpinned'); }
  else { B.pinned.add(u.uid); toast(u.name+' range pinned'); }
  SFX.select(); return true;
}
function pinnedThreat(){
  if(!B.pinned) B.pinned=new Set();
  B.pinned=new Set([...B.pinned].filter(id=>{ const e=B.units.find(x=>x.uid===id); return e&&e.hp>0; })); // auto-clean dead
  if(!B.pinned.size) return null;
  const set=new Set();
  for(const e of enemies()) if(B.pinned.has(e.uid)) for(const k of threatTiles(e,reachable(e))) set.add(k);
  return set;
}

/* ==== PROMO — class-change cutscene (light pillar, model morph, reveal) ==== */
const PROMO={
  active:false, t:0, unit:null, target:null, gains:null, f:null, swapped:false, name:'', done:null,
  play(u,targetId){ return new Promise(res=>{
    this.unit=u; this.target=targetId; this.gains=null; this.t=0; this.swapped=false; this.name='';
    this.f=BA.mkFighter(u,480,432,+1,u.hp); this.done=res; this.active=true; SFX.promote();
  }); },
  update(dt){ this.t+=dt;
    if(!this.swapped && this.t>=1200){
      const r=promote(this.unit,this.target); this.gains=r?r.gains:{};
      this.f=BA.mkFighter(this.unit,480,432,+1,this.unit.hp);
      this.name=classOf(this.unit.cls).name.toUpperCase(); this.swapped=true;
    }
    if(this.t>=3050){ this.active=false; const cb=this.done; this.done=null; if(cb)cb({gains:this.gains||{}}); }
  },
  draw(){
    ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,960,600);
    const t=this.t;
    const g=ctx.createRadialGradient(480,330,40,480,330,540); g.addColorStop(0,'#1d2544'); g.addColorStop(1,'#04060c');
    ctx.fillStyle=g; ctx.fillRect(0,0,960,600);
    ctx.fillStyle='rgba(255,255,255,.07)'; ctx.beginPath(); ctx.ellipse(480,440,130,26,0,0,6.28); ctx.fill();
    const pw= t<1200? (t/1200)*90 : Math.max(0,90*(1-(t-1200)/700));
    if(pw>0){ const pg=ctx.createLinearGradient(480-pw,0,480+pw,0);
      pg.addColorStop(0,'rgba(255,236,170,0)'); pg.addColorStop(0.5,'rgba(255,246,214,.85)'); pg.addColorStop(1,'rgba(255,236,170,0)');
      ctx.fillStyle=pg; ctx.fillRect(480-pw,0,pw*2,600); }
    try{ BA.drawFighter(this.f); }catch(e){}
    if(this.swapped){
      const k=clamp((t-1200)/900,0,1);
      for(let i=0;i<3;i++){ const rr=(k*220+i*46)%264; ctx.globalAlpha=Math.max(0,0.7-rr/264); ctx.strokeStyle='#f2c14e'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.ellipse(480,436,rr,rr*0.3,0,0,6.28); ctx.stroke(); }
      ctx.globalAlpha=1; ctx.textAlign='center';
      ctx.font='900 21px Segoe UI'; ctx.fillStyle='#9aa7bd'; ctx.fillText('C L A S S   C H A N G E',480,118);
      ctx.font='900 46px Segoe UI'; ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.75)';
      ctx.strokeText(this.name,480,172); ctx.fillStyle='#ffe49a'; ctx.fillText(this.name,480,172);
      for(let i=0;i<14;i++){ const sx=480+Math.sin(i*2.6+t/300)*(70+i*9), sy=430-((t/4+i*53)%280);
        ctx.globalAlpha=0.55*(1-((t/4+i*53)%280)/280); ctx.fillStyle='#ffe9a8'; ctx.fillRect(sx,sy,3,3); }
      ctx.globalAlpha=1;
    }
    const wa=clamp(1-Math.abs(t-1200)/260,0,1);
    if(wa>0){ ctx.fillStyle='#fff'; ctx.globalAlpha=wa; ctx.fillRect(0,0,960,600); ctx.globalAlpha=1; }
    if(t>2750){ ctx.fillStyle='#05070c'; ctx.globalAlpha=clamp((t-2750)/300,0,1); ctx.fillRect(0,0,960,600); ctx.globalAlpha=1; }
  },
};

const _uLn=(a,b,c,d)=>{ctx.beginPath();ctx.moveTo(a,b);ctx.lineTo(c,d);ctx.stroke();};
R.drawUnit=function(u){
  const rx=(u.rx??u.x), ry=(u.ry??u.y);
  const cx=rx*TS+TS/2+(u.ax||0), cy0=ry*TS+TS/2+(u.ay||0);

  const bob=(u.faction==='player'&&!u.acted&&!u._anim)?Math.sin(R.t/430+(u.uid||0)*1.7)*1.1:0;
  const cy=cy0+bob, r=TS*0.34, side=u.faction==='enemy'?-1:1;

  const acc=acted?'#9aa0ac':(port?port.accent:'#f2c14e'), cloth=acted?'#565b66':((port&&port.cloth)||fc.fill2);
  const spr=classOf(u.cls).sprite, mc=moveCat(u), hc=cy-r*0.58;
  // movement hints (behind bust): mount for horse, wings for fliers
  if(mc==='horse'){ ctx.fillStyle=acted?'rgba(70,72,82,.85)':'rgba(58,40,26,.92)'; roundRect(cx-r*0.95,cy+r*0.45,r*1.9,r*0.55,4); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+r*0.95,cy+r*0.42,r*0.22,r*0.3,0.5,0,6.28); ctx.fill();
    ctx.fillStyle=acted?'#3a3d46':'#2a1d12'; for(const lx of [-0.7,-0.25,0.25,0.7]) ctx.fillRect(cx+lx*r,cy+r*0.95,2.4,r*0.42); }
  else if(mc==='fly'){ for(const s of [-1,1]){ ctx.fillStyle=acted?'rgba(170,176,190,.8)':'rgba(232,238,250,.9)'; ctx.beginPath();
    ctx.moveTo(cx+s*r*0.5,cy-r*0.05); ctx.quadraticCurveTo(cx+s*r*1.25,cy-r*0.85,cx+s*r*1.12,cy+r*0.25); ctx.quadraticCurveTo(cx+s*r*0.78,cy+r*0.02,cx+s*r*0.5,cy-r*0.05); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=acted?'rgba(120,126,140,.55)':'rgba(150,168,205,.6)'; ctx.lineWidth=1; ctx.beginPath();

  // weapon silhouette over the back shoulder (type cached ~280ms to avoid per-frame allocs)
  if(u._wtT===undefined||R.t-u._wtT>280){ u._wtT=R.t; let t=null;
    try{ const w=equippedWeapon(u); t=w?w.type:(staffItems(u)[0]?'staff':null); }catch(e){}
    u._wtype=(t==='anima'||t==='light'||t==='dark')?'tome':t; }
  const wt=u._wtype;
  if(wt){ ctx.save(); ctx.translate(cx-side*r*0.78,cy-r*0.02); ctx.rotate(-side*0.42);
    const wc=acted?'#565b66':'#242936'; ctx.strokeStyle=wc; ctx.fillStyle=wc; ctx.lineCap='round';
    if(wt==='sword'){ ctx.lineWidth=2.8; _uLn(0,r*.05,0,-r*.92); ctx.lineWidth=2; _uLn(-r*.24,-r*.2,r*.24,-r*.2); }
    else if(wt==='lance'){ ctx.lineWidth=2.3; _uLn(0,r*.15,0,-r*.8); ctx.beginPath(); ctx.moveTo(0,-r*1.15); ctx.lineTo(3.2,-r*.76); ctx.lineTo(-3.2,-r*.76); ctx.closePath(); ctx.fill(); }
    else if(wt==='axe'){ ctx.lineWidth=2.5; _uLn(0,r*.15,0,-r*.85); ctx.beginPath(); ctx.arc(2.6,-r*.68,r*.32,-1.9,1.3); ctx.closePath(); ctx.fill(); }
    else if(wt==='bow'){ ctx.lineWidth=2.2; ctx.beginPath(); ctx.arc(-1.5,-r*.45,r*.5,-1.2,1.2); ctx.stroke();
      const ex=-1.5+Math.cos(1.2)*r*.5, ey=Math.sin(1.2)*r*.5; ctx.lineWidth=1.1; _uLn(ex,-r*.45-ey,ex,-r*.45+ey); }

    } else if(act.type==='heal'&&act.target){ doHeal(u,act.target,act.staff); }

  _reapDeaths(){ let lose=null; for(const d of B.units.filter(x=>x.hp<=0).slice()){ const l=this._killSync(d); if(l)lose=l; } return lose; },
  _enemyThreat(){ const set=new Set(); for(const e of B.units.filter(u=>u.faction==='enemy'&&u.hp>0)){ const r=reachable(e); for(const k of threatTiles(e,r)) set.add(k); } return set; },
  _carefulMove(u,threat){ const reach=reachable(u); const stand=standableTiles(u,reach);
    const foes=B.units.filter(t=>t.faction==='enemy'&&t.hp>0); if(!foes.length) return {type:'wait',unit:u};
    const field=distFieldTo(u,foes);
    let cands=stand.filter(s=>!threat.has(key(s.x,s.y))); if(!cands.length) cands=stand;

    cands.sort((a,b)=>(minEnemyDist(b)+terrainAt(mapChar(b.x,b.y)).def*0.5)-(minEnemyDist(a)+terrainAt(mapChar(a.x,a.y)).def*0.5));
    const best=cands[0]||{x:u.x,y:u.y}; return {type:'move',unit:u,pos:best}; },
  _winCheck(){ const o=B.objective;
    if(o.type==='rout'&&!B.units.some(u=>u.faction==='enemy'&&u.hp>0))return true;
    if((o.type==='seize'||o.type==='boss'||o.type==='escape')&&!B.units.some(u=>u.faction==='enemy'&&u.hp>0&&(o.type!=='boss'||u.isBoss)))return true;
    return false; },
  simChapter(idx, opts){
    opts=opts||{}; RNG.seed(opts.seed||((Math.random()*1e9)|0));
    G.difficulty=opts.diff||'normal'; G.casual=false; G.deaths=[];
    G.roster=(opts.roster||['lyra','garrett','kael','senna','elwyn','tobin']).map(recruitUnit);
    if(opts.levelTo){ G.roster.forEach(u=>{ let n=opts.levelTo; while(n-->0){ if(canPromote(u)) promote(u); else if(u.level<20) levelUp(u); } }); }
    G.convoy=[];
    const ch=CHAPTERS[idx]; buildBattle(ch, G.roster.slice(), true);
    let win=false, safety=0;
    while(!B.over && safety++<200){
      // PLAYER PHASE (semi-careful AI: fragile units & the lord avoid lethal exposure)
      const ps=B.units.filter(x=>x.faction==='player'&&x.hp>0); ps.forEach(u=>u.acted=false);
      // act with sturdy frontliners first, fragile/lord last
      ps.sort((a,b)=>(getStat(a,'def')+a.maxhp)-(getStat(b,'def')+b.maxhp)).reverse();
      const threat=this._enemyThreat();
      for(const u of [...ps]){ if(B.over||!B.units.includes(u))continue;
        u.ai={behavior:'aggressive'}; let act=aiUnitAction(u);
        const fragile = u.isLord || u.maxhp - getStat(u,'def')*2 < 24 || classOf(u.cls).canHeal;
        if(fragile && act && act.pos && threat.has(key(act.pos.x,act.pos.y))){
          // only accept if it's a safe-ish kill; else stay put / retreat
          let safe=false;
          if(act.type==='attack'&&act.target){ const f=forecast(u,act.target,Math.abs(act.pos.x-act.target.x)+Math.abs(act.pos.y-act.target.y));
            const kills=f.a.dmg*(f.a.doubles?2:1)>=act.target.hp && f.a.hit>=80;
            const counterKill=f.counter && f.counter.dmg*(f.counter.doubles?2:1)>=u.hp;
            safe = kills && !counterKill; }
          if(!safe) act = u.isLord ? this._retreatMove(u,threat) : this._carefulMove(u,threat);
        }
        this._apply(u,act);
        const lose=this._reapDeaths(); if(lose){B.over=true;win=false;break;}
        if(this._winCheck()){B.over=true;win=true;break;} }
      if(B.over)break;
      // ENEMY PHASE
      const es=B.units.filter(x=>x.faction==='enemy'&&x.hp>0); es.forEach(u=>u.acted=false);
      for(const u of [...es]){ if(B.over||!B.units.includes(u))continue;
        const act=aiUnitAction(u); this._apply(u,act);
        const lose=this._reapDeaths(); if(lose){B.over=true;win=false;break;}
        if(this._winCheck()){B.over=true;win=true;break;} }
      if(B.over)break;
      // GREEN PHASE
      const gs=B.units.filter(x=>x.faction==='green'&&x.hp>0); gs.forEach(u=>u.acted=false);
      for(const u of [...gs]){ if(B.over||!B.units.includes(u))continue; const act=aiUnitAction(u); this._apply(u,act); this._reapDeaths(); }
      B.turnCount++;
      const o=B.objective;
      if((o.type==='defend'||o.type==='survive')&&B.turnCount>o.turns){ B.over=true; win=true; break; }
      (ch.reinforcements||[]).forEach((r,i)=>{ if(r.turn===B.turnCount&&!B.reinfDone[i]){ B.reinfDone[i]=true; (r.units||[]).forEach(e=>B.units.push(instantiateEnemy(Object.assign({faction:r.faction||'enemy'},e)))); } });
    }
    const result={ win, turns:B.turnCount, survivors:B.units.filter(u=>u.faction==='player').length,
      enemiesLeft:B.units.filter(u=>u.faction==='enemy'&&u.hp>0).length, dead:G.deaths.slice(), safety };
    B=null; return result;
  },
  simMany(idx,n,opts){ const r=[]; for(let i=0;i<(n||20);i++){ r.push(this.simChapter(idx,Object.assign({seed:1000+i*97},opts))); }
    const wins=r.filter(x=>x.win).length; const avgT=Math.round(r.reduce((s,x)=>s+x.turns,0)/r.length*10)/10;
    const avgDead=Math.round(r.reduce((s,x)=>s+x.dead.length,0)/r.length*10)/10;
    return {idx,n:r.length,winRate:Math.round(wins/r.length*100)+'%',avgTurns:avgT,avgDead, sample:r.slice(0,4)}; },
};

boot();
</script>
